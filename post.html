<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 상세 - 삐삐 길드</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="post-page">
    <main class="post-shell">
      <a class="brand upload-brand" href="index.html">
        <img class="site-logo" src="assets/common/logo.png" alt="bbitsena" />
        <span class="brand-kicker">삐삐 커뮤니티</span>
        <strong>삐삐 길드</strong>
        <small>SEVENKNIGHT : REBIRTH</small>
      </a>

      <article class="post-card" id="postCard" hidden>
        <div class="post-head">
          <span class="status" id="postCategory"></span>
          <h1 id="postTitle"></h1>
          <p id="postSummary"></p>
          <div class="post-owner-actions" id="postOwnerActions" hidden>
            <button id="postEditButton" type="button">수정</button>
            <button id="postDeleteButton" type="button">삭제</button>
          </div>
        </div>

        <form class="post-edit-panel" id="postEditForm" hidden>
          <div class="post-edit-grid">
            <label>제목 <input name="title" maxlength="70" required /></label>
            <label>게시판 <input name="category" maxlength="30" required /></label>
            <label>게임 <input name="game" maxlength="40" /></label>
            <label>태그 <input name="tags" maxlength="80" placeholder="쉼표로 구분" /></label>
          </div>
          <label>요약 <textarea name="summary" rows="3" maxlength="220" required></textarea></label>
          <label>본문 <textarea name="body" rows="8"></textarea></label>
          <section class="editor-box post-edit-media-box" aria-label="미디어 추가">
            <div class="editor-toolbar">
              <label class="tool-file">
                이미지 추가
                <input id="postEditImageInput" type="file" accept="image/*" multiple />
              </label>
              <label class="tool-file">
                동영상 추가
                <input id="postEditVideoInput" type="file" accept="video/*" multiple />
              </label>
              <button type="button" id="postEditYoutubeButton">유튜브</button>
            </div>
            <div class="youtube-field" id="postEditYoutubeField" hidden>
              <input id="postEditYoutubeInput" type="url" placeholder="유튜브 링크를 붙여넣어 주세요." />
            </div>
            <div class="media-preview" id="postEditMediaPreview" aria-live="polite"></div>
          </section>
          <p class="auth-error" id="postEditError" hidden></p>
          <div class="post-edit-actions">
            <button type="button" id="postEditCancelButton">취소</button>
            <button type="submit">저장</button>
          </div>
        </form>

        <div class="post-body-layout">
          <div class="post-main-flow">
            <dl class="post-meta">
              <div><dt>공성전</dt><dd id="postGame"></dd></div>
              <div><dt>작성자</dt><dd id="postAuthor"></dd></div>
              <div><dt>작성일</dt><dd id="postDate"></dd></div>
              <div><dt>추천</dt><dd><button class="post-vote-button" id="postVoteButton" type="button"><img src="assets/common/recommend-icon.svg" alt="" /><span id="postVotes"></span></button></dd></div>
              <div><dt>조회</dt><dd id="postViews"></dd></div>
            </dl>

            <section class="post-section post-article-section">
              <h2>공략 내용</h2>
              <div class="post-content" id="postBody"></div>
            </section>

            <section class="post-section">
              <h2>태그</h2>
              <div class="post-tags" id="postTags"></div>
            </section>

            <section class="post-section" id="attachmentSection" hidden>
              <h2>첨부</h2>
              <p id="postAttachment"></p>
            </section>

            <section class="post-section comment-section">
              <div class="section-title">
                <div>
                  <h2>댓글</h2>
                  <p>공략에 대한 질문과 보충 내용을 남겨보세요.</p>
                </div>
              </div>
              <form class="comment-form" id="commentForm">
                <textarea id="commentInput" name="content" rows="3" maxlength="1000" placeholder="댓글을 입력하세요."></textarea>
                <div>
                  <p class="auth-error" id="commentError" hidden></p>
                  <button type="submit">등록</button>
                </div>
              </form>
              <div class="comment-list" id="commentList" aria-live="polite"></div>
            </section>

            <nav class="post-nav" aria-label="이전글 다음글">
              <a id="prevPost" href="#" aria-disabled="true"><span>이전글</span><strong>이전 글이 없습니다</strong></a>
              <a id="nextPost" href="#" aria-disabled="true"><span>다음글</span><strong>다음 글이 없습니다</strong></a>
            </nav>

            <section class="post-list-section">
              <div class="section-title">
                <div>
                  <h2>게시글 목록</h2>
                  <p>다른 공략도 이어서 확인해보세요.</p>
                </div>
              </div>
              <div class="compact-post-list" id="compactPostList"></div>
            </section>

            <div class="post-actions">
              <a href="index.html">목록으로</a>
            </div>
          </div>

          <aside class="post-side-panel" aria-label="게시글 PVP 공략">
            <strong>게시글 PVP 공략</strong>
            <a href="index.html">목록</a>
            <a href="upload.html" target="_blank" rel="noopener">글쓰기</a>
            <span id="sideAuthor">작성자 -</span>
            <span id="sideCategory">게시판</span>
            <span id="sideViews">조회 0</span>
          </aside>
        </div>
      </article>

      <section class="post-card not-found" id="notFound" hidden>
        <h1>게시글을 찾을 수 없습니다</h1>
        <p>삭제되었거나 잘못된 주소일 수 있습니다.</p>
        <a href="index.html">목록으로 돌아가기</a>
      </section>
    </main>

    <script src="theme.js"></script>
    <script>
      const storageKey = "bbibbi-board-items-v2";
      const params = new URLSearchParams(location.search);
      const postId = params.get("id");
      let currentPost = null;
      let postVoted = false;
      let currentUser = null;
      let replyTargetId = null;
      let editImageFiles = [];
      let editVideoFiles = [];
      const maxImageSize = 8 * 1024 * 1024;
      const maxVideoSize = 500 * 1024 * 1024;
      const boardAliases = {
        베스트: "전체",
        "자유 게시판": "PVP 게시판",
        "데미지 고급": "임시 채널1",
        "아이템 고급": "임시 채널2",
      };
      function normalizeBoard(value) {
        return boardAliases[value] || value;
      }

      function formatNumber(value) {
        const number = Number(value) || 0;
        if (number >= 10000) return `${(number / 10000).toFixed(1)}만`;
        return number.toLocaleString("ko-KR");
      }

      function loadGuides() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || "[]");
        } catch {
          return [];
        }
      }

      const roleIconMap = {
        superadmin: { label: "최고관리자", src: "assets/common/최고관리자.png" },
        admin: { label: "관리자", src: "assets/common/관리자.png" },
        elite: { label: "정예", src: "assets/common/정예.png" },
        verified: { label: "정예", src: "assets/common/정예.png" },
        user: { label: "일반", src: "assets/common/일반.png" },
        blocked: { label: "기본", src: "assets/common/기본.png" },
        default: { label: "기본", src: "assets/common/기본.png" },
      };

      function appendNameWithRole(target, name, role) {
        const icon = roleIconMap[role] || roleIconMap.default;
        const image = document.createElement("img");
        image.className = "role-icon";
        image.src = icon.src;
        image.alt = icon.label;
        image.title = icon.label;
        image.loading = "lazy";
        target.textContent = "";
        target.classList.add("role-name");
        target.append(image, document.createTextNode(name || "익명"));
      }

      function setText(id, value) {
        const target = document.querySelector(id);
        if (target) target.textContent = value;
      }

      function renderVoteState(guide) {
        const button = document.querySelector("#postVoteButton");
        setText("#postVotes", formatNumber(guide.votes));
        if (!button) return;
        button.classList.toggle("active", postVoted || Boolean(guide.voted));
        button.title = postVoted || guide.voted ? "추천 취소" : "추천";
      }

      async function loadCurrentUser() {
        currentUser = await fetch("/api/me").then((response) => response.json()).catch(() => ({ loggedIn: false }));
      }

      function canManageCurrentPost(guide = currentPost) {
        if (!guide || !currentUser?.loggedIn) return false;
        return Boolean(guide.canEdit || currentUser.isAdmin || currentUser.isSuperAdmin || guide.authorUsername === currentUser.username);
      }

      function syncPostOwnerActions() {
        const actions = document.querySelector("#postOwnerActions");
        if (actions) actions.hidden = !canManageCurrentPost();
      }

      function getYoutubeEmbed(url) {
        const value = String(url || "").trim();
        const match = value.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{6,})/);
        return match ? `https://www.youtube.com/embed/${match[1]}` : "";
      }

      function renderEditMediaPreview() {
        const preview = document.querySelector("#postEditMediaPreview");
        if (!preview) return;
        preview.innerHTML = "";
        const media = currentPost?.media || {};
        const existingImages = Array.isArray(media.images) ? media.images.length : 0;
        const existingVideos = Array.isArray(media.videos) ? media.videos.length : media.videoFile ? 1 : 0;
        if (existingImages) {
          const item = document.createElement("span");
          item.textContent = `기존 이미지 ${existingImages}개`;
          preview.append(item);
        }
        if (existingVideos) {
          const item = document.createElement("span");
          item.textContent = `기존 동영상 ${existingVideos}개`;
          preview.append(item);
        }
        editImageFiles.forEach((file) => {
          const item = document.createElement("span");
          item.textContent = `추가 이미지 · ${file.name}`;
          preview.append(item);
        });
        editVideoFiles.forEach((file) => {
          const item = document.createElement("span");
          item.textContent = `추가 동영상 · ${file.name}`;
          preview.append(item);
        });
        const youtube = document.querySelector("#postEditYoutubeInput")?.value.trim();
        if (youtube || media.youtubeEmbed) {
          const item = document.createElement("span");
          item.textContent = youtube
            ? getYoutubeEmbed(youtube) ? "유튜브 · 새 링크 연결됨" : "유튜브 · 링크 확인 필요"
            : "기존 유튜브 링크 유지";
          preview.append(item);
        }
      }

      function openPostEditor() {
        if (!currentPost) return;
        const form = document.querySelector("#postEditForm");
        form.hidden = false;
        form.elements.title.value = currentPost.title || "";
        form.elements.category.value = currentPost.category || "";
        form.elements.game.value = currentPost.game || "";
        form.elements.summary.value = currentPost.summary || "";
        form.elements.body.value = currentPost.body || "";
        form.elements.tags.value = Array.isArray(currentPost.tags) ? currentPost.tags.join(", ") : "";
        document.querySelector("#postEditYoutubeInput").value = currentPost.media?.youtube || "";
        document.querySelector("#postEditYoutubeField").hidden = !currentPost.media?.youtube;
        editImageFiles = [];
        editVideoFiles = [];
        renderEditMediaPreview();
        document.querySelector("#postEditError").hidden = true;
        form.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function closePostEditor() {
        document.querySelector("#postEditForm").hidden = true;
      }

      async function submitPostEdit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const error = document.querySelector("#postEditError");
        const formData = new FormData();
        formData.set("title", form.elements.title.value);
        formData.set("category", form.elements.category.value);
        formData.set("game", form.elements.game.value);
        formData.set("summary", form.elements.summary.value);
        formData.set("body", form.elements.body.value);
        formData.set("tags", form.elements.tags.value);
        const youtube = document.querySelector("#postEditYoutubeInput").value.trim();
        formData.set("youtube", youtube);
        formData.set("youtubeEmbed", getYoutubeEmbed(youtube));
        editImageFiles.forEach((file) => formData.append("images", file));
        editVideoFiles.forEach((file) => formData.append("videos", file));
        const response = await fetch(`/api/posts/${encodeURIComponent(currentPost.id)}`, {
          method: "PATCH",
          body: formData,
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({ error: "게시글 수정 실패" }));
          error.textContent = data.error || "게시글 수정 실패";
          error.hidden = false;
          return;
        }

        const data = await response.json();
        currentPost = data.post || currentPost;
        hydratePost(currentPost);
        editImageFiles = [];
        editVideoFiles = [];
        closePostEditor();
      }

      async function deletePost() {
        if (!currentPost || !confirm("게시글을 삭제할까요?")) return;
        const response = await fetch(`/api/posts/${encodeURIComponent(currentPost.id)}`, { method: "DELETE" });
        if (response.ok) {
          location.href = "index.html";
        }
      }

      async function loadPostData() {
        try {
          const response = await fetch(`/api/posts/${encodeURIComponent(postId)}`);
          if (!response.ok) throw new Error("post failed");
          return response.json();
        } catch {
          const guides = loadGuides();
          const postIndex = guides.findIndex((item) => item.id === postId);
          return {
            post: guides[postIndex],
            posts: guides,
            prevPost: guides[postIndex - 1],
            nextPost: guides[postIndex + 1],
          };
        }
      }

      function renderPostBody(guide) {
        const body = document.querySelector("#postBody");
        const source = guide.body || guide.content || guide.summary || "아직 상세 본문이 없습니다.";
        const parts = String(source)
          .split(/\n{2,}/)
          .map((item) => item.trim())
          .filter(Boolean);

        body.innerHTML = "";
        parts.forEach((part) => {
          const paragraph = document.createElement("p");
          paragraph.textContent = part;
          body.append(paragraph);
        });

        renderPostMedia(body, guide.media || {});
        renderPveGuide(body, guide.media?.pveGuide);
      }

      function renderPveGuide(body, guide) {
        if (!guide || typeof guide !== "object") return;
        const mode = guide.mode === "pvp" ? "pvp" : "pve";
        const hasPayload = [guide.type, guide.boss, guide.power, guide.formation, guide.allyTeam, guide.winPlan, guide.caution, guide.note].some(Boolean)
          || (Array.isArray(guide.heroes) && guide.heroes.length)
          || (Array.isArray(guide.specs) && guide.specs.length);
        if (!hasPayload) return;

        const shell = document.createElement("section");
        const head = document.createElement("div");
        const title = document.createElement("h2");
        const summary = document.createElement("div");
        const heroList = document.createElement("div");
        const specList = document.createElement("div");
        const note = document.createElement("p");

        shell.className = `pve-guide-view is-${mode}`;
        head.className = "pve-guide-view-head";
        summary.className = "pve-guide-summary";
        heroList.className = "pve-guide-heroes";
        specList.className = "pve-guide-specs";
        note.className = "pve-guide-note";

        const typeLabel = document.createElement("span");
        title.textContent = guide.boss || (mode === "pvp" ? "PVP 공략" : "PVE 공략");
        typeLabel.textContent = guide.type || (mode === "pvp" ? "PVP 공략" : "PVE 공략");
        head.append(title, typeLabel);
        shell.append(head);

        const summaryItems = mode === "pvp"
          ? [
              ["상대", guide.boss],
              ["우리", guide.allyTeam],
              ["승리", guide.winPlan || guide.power],
              ["포지션", guide.formation],
            ]
          : [
              ["권장", guide.power],
              ["배치", guide.formation],
            ];
        summaryItems.forEach(([label, value]) => {
          if (!value) return;
          const item = document.createElement("span");
          const name = document.createElement("b");
          name.textContent = label;
          item.append(name, document.createTextNode(value));
          summary.append(item);
        });
        if (mode === "pvp" && guide.caution) {
          const item = document.createElement("span");
          const label = document.createElement("b");
          item.className = "strategy-caution";
          label.textContent = "주의";
          item.append(label, document.createTextNode(guide.caution));
          summary.append(item);
        }
        if (summary.children.length) shell.append(summary);

        if (guide.formationType) {
          const formation = createFormationPreview(guide.formationType);
          if (formation) shell.append(formation);
        }

        (guide.heroes || []).filter((hero) => hero.name || hero.role).forEach((hero) => {
          const card = document.createElement("span");
          const heroImage = getCharacterImage(hero.name);
          const accessory = getAccessoryImage(hero.accessory, hero.grade);
          card.className = "strategy-hero-card";
          card.innerHTML = `
            <i>${heroImage ? `<img src="${heroImage}" alt="${hero.name}" />` : (hero.name || "?").slice(0, 1)}</i>
            <b>${hero.name || "-"}</b>
            <small>${hero.role || "핵심 영웅"}</small>
            ${accessory ? `<em><img src="${accessory.src}" alt="${accessory.label}" />${accessory.label}</em>` : ""}
          `;
          heroList.append(card);
        });
        if (heroList.children.length) shell.append(heroList);

        (guide.specs || []).filter((spec) => spec.label || spec.value || spec.memo).forEach((spec) => {
          const row = document.createElement("span");
          row.innerHTML = `<b>${spec.label || "-"}</b><em>${spec.value || "-"}</em><small>${spec.memo || ""}</small>`;
          specList.append(row);
        });
        if (specList.children.length) shell.append(specList);

        if (guide.note) {
          note.textContent = guide.note;
          shell.append(note);
        }
        body.append(shell);
      }

      function getCharacterImage(name) {
        const cleanName = String(name || "").trim();
        return cleanName ? `assets/character/${cleanName}.png` : "";
      }

      function getAccessoryImage(type, grade) {
        const cleanType = String(type || "").trim();
        const imageGrade = String(grade || "6").split("/").pop();
        const map = {
          불사의반지: { src: `assets/ring/immortality${imageGrade === "4" ? "1" : imageGrade === "5" ? "2" : "3"}.png`, label: `${cleanType} ${grade || "6"}★` },
          부활의반지: { src: `assets/ring/resurrection${imageGrade === "4" ? "1" : imageGrade === "5" ? "2" : "3"}.png`, label: `${cleanType} ${grade || "6"}★` },
          권능의반지: { src: `assets/ring/Might${imageGrade === "4" ? "1" : imageGrade === "5" ? "2" : "3"}.png`, label: `${cleanType} ${grade || "6"}★` },
        };
        return map[cleanType] || null;
      }

      function createFormationPreview(type) {
        const map = {
          att: ["공격진형", "assets/formation/att.png"],
          bal: ["밸런스진형", "assets/formation/Bal.png"],
          base: ["기본진형", "assets/formation/base.png"],
          def: ["보호진형", "assets/formation/def.png"],
        };
        const item = map[type];
        if (!item) return null;
        const box = document.createElement("div");
        box.className = "strategy-formation-preview";
        box.innerHTML = `<img src="${item[1]}" alt="${item[0]}" /><b>${item[0]}</b>`;
        return box;
      }

      function isReservedMediaAsset(image = {}) {
        const haystack = `${image.name || ""} ${image.src || ""}`.toLowerCase();
        const reservedTokens = [
          "bbitsena",
          "logo",
          "role",
          "assets/common/",
          "관리자",
          "기본",
          "일반",
          "정예",
          "최고관리자",
        ];
        return reservedTokens.some((token) => haystack.includes(token.toLowerCase()));
      }

      function renderPostMedia(body, media) {
        const images = Array.isArray(media.images)
          ? media.images.filter((image) => !isReservedMediaAsset(image))
          : [];
        const hasImages = images.length;
        const hasYoutube = Boolean(media.youtubeEmbed);
        const videos = Array.isArray(media.videos) && media.videos.length
          ? media.videos
          : media.videoFile ? [media.videoFile] : [];
        const hasVideo = Boolean(videos.length);
        if (!hasImages && !hasYoutube && !hasVideo) return;

        const wrap = document.createElement("div");
        wrap.className = "post-media";

        if (hasYoutube) {
          const frameWrap = document.createElement("div");
          const frame = document.createElement("iframe");
          frameWrap.className = "youtube-embed";
          frame.src = media.youtubeEmbed;
          frame.title = "YouTube video player";
          frame.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
          frame.allowFullscreen = true;
          frameWrap.append(frame);
          wrap.append(frameWrap);
        }

        if (hasImages) {
          images.forEach((image) => {
            const figure = document.createElement("figure");
            const img = document.createElement("img");
            const caption = document.createElement("figcaption");
            img.src = image.src;
            img.alt = image.name || "첨부 이미지";
            caption.textContent = image.name || "첨부 이미지";
            figure.append(img, caption);
            wrap.append(figure);
          });
        }

        if (hasVideo) {
          videos.forEach((videoFile) => {
            if (videoFile.src) {
              const video = document.createElement("video");
              const source = document.createElement("source");
              video.controls = true;
              video.preload = "metadata";
              video.playsInline = true;
              video.title = videoFile.name || "첨부 동영상";
              source.src = videoFile.src;
              source.type = videoFile.type || "video/mp4";
              video.append(source);

              const fallback = document.createElement("div");
              const openLink = document.createElement("a");
              fallback.className = "post-inline-note video-fallback";
              fallback.hidden = true;
              fallback.textContent = "동영상을 불러오지 못했습니다. ";
              openLink.href = videoFile.src;
              openLink.target = "_blank";
              openLink.rel = "noopener";
              openLink.textContent = "새 창에서 열기";
              fallback.append(openLink);
              video.addEventListener("error", () => {
                fallback.hidden = false;
              });
              wrap.append(video, fallback);
            } else {
              const videoNote = document.createElement("div");
              videoNote.className = "post-inline-note";
              videoNote.textContent = `동영상 파일: ${videoFile.name}`;
              wrap.append(videoNote);
            }
          });
        }

        body.append(wrap);
      }

      function bindSiblingPost(selector, label, sibling) {
        const link = document.querySelector(selector);
        const title = link.querySelector("strong");

        if (!sibling) {
          link.removeAttribute("href");
          link.setAttribute("aria-disabled", "true");
          title.textContent = `${label}이 없습니다`;
          return;
        }

        link.href = `post.html?id=${encodeURIComponent(sibling.id)}`;
        link.setAttribute("aria-disabled", "false");
        title.textContent = sibling.title || "제목 없음";
      }

      function renderCompactList(guides, currentId) {
        const list = document.querySelector("#compactPostList");
        list.innerHTML = "";
        guides.slice(0, 8).forEach((item) => {
          const link = document.createElement("a");
          const title = document.createElement("span");
          const meta = document.createElement("small");

          link.href = `post.html?id=${encodeURIComponent(item.id)}`;
          link.className = item.id === currentId ? "active" : "";
          title.textContent = item.title || "제목 없음";
          meta.textContent = `${normalizeBoard(item.category) || "게시글"} · ${item.createdAt || "알 수 없음"} · 추천 ${formatNumber(item.votes)}`;
          link.append(title, meta);
          list.append(link);
        });
      }

      function renderComments(comments) {
        const list = document.querySelector("#commentList");
        list.innerHTML = "";

        if (!comments.length) {
          const empty = document.createElement("p");
          empty.className = "account-empty";
          empty.textContent = "아직 댓글이 없습니다.";
          list.append(empty);
          return;
        }

        comments.forEach((comment) => {
          const item = document.createElement("article");
          const head = document.createElement("div");
          const author = document.createElement("strong");
          const date = document.createElement("time");
          const content = document.createElement("p");
          const actions = document.createElement("div");
          const voteButton = document.createElement("button");
          const replyButton = document.createElement("button");

          item.className = comment.parentId ? "comment-item comment-reply" : "comment-item";
          appendNameWithRole(author, comment.author || "익명", comment.authorRole);
          date.textContent = comment.createdAt || "";
          content.textContent = comment.content || "";
          voteButton.className = "comment-vote-button";
          voteButton.classList.toggle("active", Boolean(comment.voted));
          voteButton.type = "button";
          voteButton.textContent = `추천 ${formatNumber(comment.votes)}`;
          voteButton.addEventListener("click", () => toggleCommentVote(comment.id, voteButton));
          replyButton.className = "comment-reply-button";
          replyButton.type = "button";
          replyButton.textContent = "답글";
          replyButton.addEventListener("click", () => setReplyTarget(comment));
          head.append(author, date);
          actions.className = "comment-actions";
          actions.append(voteButton, replyButton);
          item.append(head, content, actions);
          list.append(item);
        });
      }

      function setReplyTarget(comment) {
        replyTargetId = comment.id;
        const input = document.querySelector("#commentInput");
        input.placeholder = `${comment.author || "댓글"}님에게 답글`;
        input.focus();
      }

      async function loadComments() {
        const response = await fetch(`/api/posts/${encodeURIComponent(postId)}/comments`);
        if (!response.ok) return;
        renderComments(await response.json());
      }

      async function togglePostVote() {
        if (!currentPost) return;
        const response = await fetch(`/api/posts/${encodeURIComponent(currentPost.id)}/vote`, { method: "POST" });
        if (!response.ok) return;
        const result = await response.json();
        postVoted = Boolean(result.voted);
        currentPost = result.post || currentPost;
        renderVoteState(currentPost);
      }

      async function toggleCommentVote(commentId, button) {
        const response = await fetch(`/api/comments/${encodeURIComponent(commentId)}/vote`, { method: "POST" });
        if (!response.ok) return;
        const result = await response.json();
        const comment = result.comment || {};
        button.classList.toggle("active", Boolean(result.voted));
        button.textContent = `추천 ${formatNumber(comment.votes)}`;
      }

      async function submitComment(event) {
        event.preventDefault();
        const input = document.querySelector("#commentInput");
        const error = document.querySelector("#commentError");
        const content = input.value.trim();
        if (!content) return;

        const response = await fetch(`/api/posts/${encodeURIComponent(postId)}/comments`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content, parentId: replyTargetId }),
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({ error: "댓글 등록에 실패했습니다." }));
          error.textContent = data.error || "댓글 등록에 실패했습니다.";
          error.hidden = false;
          return;
        }

        const result = await response.json();
        currentPost = result.post || currentPost;
        input.value = "";
        replyTargetId = null;
        input.placeholder = "댓글을 입력하세요.";
        error.hidden = true;
        renderVoteState(currentPost);
        await loadComments();
      }

      function hydratePost(guide) {
        document.title = `${guide.title} - 삐삐 길드`;
        setText("#postCategory", normalizeBoard(guide.category) || "게시글");
        setText("#postTitle", guide.title || "제목 없음");
        setText("#postSummary", guide.summary || "요약이 없습니다.");
        setText("#postGame", guide.game || "미지정");
        appendNameWithRole(document.querySelector("#postAuthor"), guide.author || guide.displayName || "익명", guide.authorRole);
        setText("#postDate", guide.createdAt || "알 수 없음");
        renderVoteState(guide);
        setText("#postViews", formatNumber(guide.views));
        setText("#sideAuthor", `작성자 ${guide.author || guide.displayName || "익명"}`);
        setText("#sideCategory", normalizeBoard(guide.category) || "게시판");
        setText("#sideViews", `조회 ${formatNumber(guide.views)}`);
        renderPostBody(guide);

        const tagBox = document.querySelector("#postTags");
        tagBox.innerHTML = "";
        const tags = Array.isArray(guide.tags) ? guide.tags : [];
        if (!tags.length) {
          const empty = document.createElement("span");
          empty.textContent = "태그 없음";
          tagBox.append(empty);
        }
        tags.forEach((tag) => {
          const node = document.createElement("span");
          node.textContent = `#${tag}`;
          tagBox.append(node);
        });

        if (guide.attachment) {
          document.querySelector("#attachmentSection").hidden = false;
          setText("#postAttachment", guide.attachment);
        }
        syncPostOwnerActions();
      }

      Promise.all([loadCurrentUser(), loadPostData()]).then(([, { post: guide, posts: guides, prevPost, nextPost }]) => {
        if (!guide) {
          document.querySelector("#notFound").hidden = false;
          return;
        }

        currentPost = guide;
        postVoted = Boolean(guide.voted);
        hydratePost(guide);

        bindSiblingPost("#prevPost", "이전 글", prevPost);
        bindSiblingPost("#nextPost", "다음 글", nextPost);
        renderCompactList(guides, guide.id);
        document.querySelector("#postCard").hidden = false;
        document.querySelector("#postVoteButton")?.addEventListener("click", togglePostVote);
        document.querySelector("#postEditButton")?.addEventListener("click", openPostEditor);
        document.querySelector("#postDeleteButton")?.addEventListener("click", deletePost);
        document.querySelector("#postEditForm")?.addEventListener("submit", submitPostEdit);
        document.querySelector("#postEditCancelButton")?.addEventListener("click", closePostEditor);
        document.querySelector("#postEditYoutubeButton")?.addEventListener("click", () => {
          const field = document.querySelector("#postEditYoutubeField");
          field.hidden = !field.hidden;
          if (!field.hidden) document.querySelector("#postEditYoutubeInput")?.focus();
          renderEditMediaPreview();
        });
        document.querySelector("#postEditYoutubeInput")?.addEventListener("input", renderEditMediaPreview);
        document.querySelector("#postEditImageInput")?.addEventListener("change", (event) => {
          const selected = [...event.target.files].slice(0, 6);
          editImageFiles = selected.filter((file) => file.size <= maxImageSize);
          renderEditMediaPreview();
        });
        document.querySelector("#postEditVideoInput")?.addEventListener("change", (event) => {
          const selected = [...event.target.files].slice(0, 3);
          editVideoFiles = selected.filter((file) => file.size <= maxVideoSize);
          renderEditMediaPreview();
        });
        document.querySelector("#commentForm")?.addEventListener("submit", submitComment);
        loadComments();
      });
    </script>
    <script src="notification-client.js"></script>
  </body>
</html>
