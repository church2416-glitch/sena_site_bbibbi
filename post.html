        <span class="brand-kicker">삐삐 커뮤니티</span>

      <article class="post-card" id="postCard" hidden>
        <div class="post-head">
          <span class="status" id="postCategory"></span>
          <h1 id="postTitle"></h1>
          <p id="postSummary"></p>
          <div class="notice-hero-meta" id="noticeHeroMeta" hidden></div>
          <div class="post-owner-actions" id="postOwnerActions" hidden>
            <button id="postEditButton" type="button">수정</button>
            <button id="postDeleteButton" type="button">삭제</button>

        <form class="post-edit-panel" id="postEditForm" hidden>
          <div class="post-edit-grid">
            <label>제목 <input name="title" maxlength="70" required /></label>
            <label>게시판 <input name="category" maxlength="30" required /></label>
            <label>게임 <input name="game" maxlength="40" /></label>
            <label>태그 <input name="tags" maxlength="80" placeholder="쉼표로 구분" /></label>
          </div>
          <label>요약 <textarea name="summary" rows="3" maxlength="220" required></textarea></label>
          <label>본문 <textarea name="body" rows="8"></textarea></label>
          <section class="editor-box post-edit-media-box" aria-label="미디어 추가">
            <div class="editor-toolbar">
              <label class="tool-file">
                이미지 추가
                <input id="postEditImageInput" type="file" accept="image/jpeg,image/png,image/gif,image/webp,image/avif,image/bmp,.jpg,.jpeg,.jfif,.png,.gif,.webp,.avif,.bmp" multiple />
              </label>
              <label class="tool-file">
                동영상 추가
                <input id="postEditVideoInput" type="file" accept="video/mp4,video/webm,video/ogg,video/quicktime,video/x-m4v,video/mpeg,video/x-msvideo,video/x-matroska,.mp4,.m4v,.webm,.ogv,.ogg,.mov,.mpeg,.mpg,.avi,.mkv" multiple />
              </label>
              <button type="button" id="postEditYoutubeButton">유튜브</button>
            </div>
            <div class="youtube-field" id="postEditYoutubeField" hidden>
              <input id="postEditYoutubeInput" type="url" placeholder="유튜브 링크를 붙여넣어 주세요." />
            </div>
            <div class="media-preview" id="postEditMediaPreview" aria-live="polite"></div>
          </section>
          <p class="auth-error" id="postEditError" hidden></p>
          <div class="post-edit-actions">
            <button type="button" id="postEditCancelButton">취소</button>
            <button type="submit">저장</button>
          </div>
        </form>

        <div class="post-body-layout">
          <div class="post-main-flow">
            <dl class="post-meta">
              <div><dt>게임</dt><dd id="postGame"></dd></div>
              <div><dt>작성자</dt><dd id="postAuthor"></dd></div>
              <div><dt>작성일</dt><dd id="postDate"></dd></div>
              <div><dt>추천</dt><dd><button class="post-vote-button" id="postVoteButton" type="button"><img src="/assets/common/recommend-icon.svg" alt="" /><span id="postVotes"></span></button></dd></div>
              <div><dt>조회</dt><dd id="postViews"></dd></div>
            </dl>

            <section class="post-section post-article-section">
              <h2>내용</h2>
              <div class="post-content" id="postBody"></div>
            </section>

            <section class="post-section post-tags-section">
              <h2>태그</h2>
              <div class="post-tags" id="postTags"></div>
            </section>

            <section class="post-section" id="attachmentSection" hidden>
              <h2>첨부</h2>
              <p id="postAttachment"></p>
            </section>

            <section class="post-section comment-section">
              <div class="section-title">
                <div class="comment-submit-row">
                  <h2>댓글</h2>
                  <p>공략에 대한 질문과 보충 내용을 남겨보세요.</p>
                </div>
              </div>
              <form class="comment-form" id="commentForm">
                <div class="comment-mention-tools" aria-label="댓글 멘션 도구">
                  <button type="button" data-comment-mention="@">@닉네임</button>
                  <button type="button" data-comment-mention="@전체">@전체</button>
                  <button type="button" data-comment-mention="@관리자">@관리자</button>
                  <button type="button" data-comment-mention="@정예">@정예</button>
                  <button type="button" data-comment-mention="@권한">@권한</button>
                </div>
                <textarea id="commentInput" name="content" rows="3" maxlength="1000" placeholder="댓글을 입력하세요."></textarea>
                <p class="comment-mention-help">댓글과 답글에서도 @닉네임, @전체, @관리자, @정예, @권한 멘션 알림을 보낼 수 있습니다.</p>

            <nav class="post-nav" aria-label="이전글 다음글">
              <a id="prevPost" href="#" aria-disabled="true"><span>이전글</span><strong>이전 글이 없습니다</strong></a>
              <a id="nextPost" href="#" aria-disabled="true"><span>다음글</span><strong>다음 글이 없습니다</strong></a>
            </nav>

            <section class="post-list-section">
              <div class="section-title">
                <div>
                  <h2>게시글 목록</h2>
                  <p>다른 공략도 이어서 확인해보세요.</p>

            <div class="post-actions">
              <a href="/">목록으로</a>
            </div>

          <aside class="post-side-panel" aria-label="게시글 정보">
            <strong>게시글 정보</strong>
            <a href="/">목록</a>
            <a id="sideWriteLink" href="/board/write" target="_blank" rel="noopener">글쓰기</a>
            <span id="sideAuthor">작성자 -</span>
            <span id="sideCategory">게시판</span>
            <span id="sideViews">조회 0</span>
          </aside>
        </div>
      </article>

      <section class="post-card not-found" id="notFound" hidden>
        <h1>게시글을 찾을 수 없습니다</h1>
        <p>삭제되었거나 잘못된 주소일 수 있습니다.</p>
        <a href="/">목록으로 돌아가기</a>
      </section>
    </main>

    <script src="/theme.js"></script>
    <script src="/mention-autocomplete.js"></script>
    <script>
      const storageKey = "bbibbi-board-items-v2";
      const params = new URLSearchParams(location.search);
      const pathPostMatch = location.pathname.match(/^\/board\/post\/([^/]+)$/);
      const postId = params.get("id") || (pathPostMatch ? decodeURIComponent(pathPostMatch[1]) : null);
      let currentPost = null;
      let postVoted = false;
      let currentUser = null;
      let replyTargetId = null;
      let currentComments = [];
      const commentSortStorageKey = "bbibbi.commentSortMode";
      let commentSortMode = loadCommentSortMode();
      let editImageFiles = [];
      let editVideoFiles = [];
      const maxImageSize = 8 * 1024 * 1024;
      const maxVideoSize = 500 * 1024 * 1024;
      const boardAliases = {
        베스트: "전체",
        "자유 게시판": "PVP 게시판",
        "데미지 고급": "임시 채널1",
        "아이템 고급": "임시 채널2",
      };
      function normalizeBoard(value) {
        return boardAliases[value] || value;
      }

      function loadCommentSortMode() {
        try {
          const saved = localStorage.getItem(commentSortStorageKey);
          return saved === "latest" ? "latest" : "registered";
        } catch {
          return "registered";
        }
      }

      function saveCommentSortMode(value) {
        commentSortMode = value === "latest" ? "latest" : "registered";
        try {
          localStorage.setItem(commentSortStorageKey, commentSortMode);
        } catch {}
      }

      function isNoticePost(post) {
        return normalizeBoard(post?.category) === "공지사항";
      }

      function formatNumber(value) {
        const number = Number(value) || 0;
        if (number >= 10000) return `${(number / 10000).toFixed(1)}만`;
        return number.toLocaleString("ko-KR");
      }

      function formatKstDate(value) {
        const raw = String(value || "").trim();
        if (!raw) return "";
        const loungeStamp = raw.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})$/);
        const normalized = loungeStamp
          ? `${loungeStamp[1]}-${loungeStamp[2]}-${loungeStamp[3]}T${loungeStamp[4]}:${loungeStamp[5]}:${loungeStamp[6]}+09:00`
          : /^\d{4}-\d{2}-\d{2} \d{2}:\d{2}/.test(raw)
            ? raw.replace(" ", "T") + "Z"
            : raw;
        const date = new Date(normalized);
        if (Number.isNaN(date.getTime())) return raw;
        const parts = Object.fromEntries(new Intl.DateTimeFormat("en-CA", {
          timeZone: "Asia/Seoul",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
        }).formatToParts(date).map((part) => [part.type, part.value]));
        return `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}`;
      }

      function loadGuides() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || "[]");
        } catch {
          return [];
        }
      }

      const roleIconMap = {
        superadmin: { label: "최고관리자", src: "/assets/common/최고관리자.webp" },
        admin: { label: "관리자", src: "/assets/common/관리자.webp" },
        elite: { label: "정예", src: "/assets/common/정예.webp" },
        verified: { label: "정예", src: "/assets/common/정예.webp" },
        user: { label: "일반", src: "/assets/common/일반.webp" },
        blocked: { label: "기본", src: "/assets/common/기본.webp" },
        default: { label: "기본", src: "/assets/common/기본.webp" },
      };

      function appendNameWithRole(target, name, role) {
        const icon = roleIconMap[role] || roleIconMap.default;
        const image = document.createElement("img");
        image.className = "role-icon";
        image.src = icon.src;
        image.alt = icon.label;
        image.title = icon.label;
        image.loading = "lazy";
        target.textContent = "";
        target.classList.add("role-name");
        target.append(image, document.createTextNode(name || "익명"));
      }

      function setText(id, value) {
        const target = document.querySelector(id);
        if (target) target.textContent = value;
      }

      function renderVoteState(guide) {
        const button = document.querySelector("#postVoteButton");
        setText("#postVotes", formatNumber(guide.votes));
        if (!button) return;
        button.classList.toggle("active", postVoted || Boolean(guide.voted));
        button.title = postVoted || guide.voted ? "추천 취소" : "추천";
      }

      async function loadCurrentUser() {
        currentUser = await fetch("/api/me").then((response) => response.json()).catch(() => ({ loggedIn: false }));
      }

      function canManageCurrentPost(guide = currentPost) {
        if (!guide || !currentUser?.loggedIn) return false;
        return Boolean(guide.canEdit || currentUser.isAdmin || currentUser.isSuperAdmin || guide.authorUsername === currentUser.username);
      }

      function syncPostOwnerActions() {
        const actions = document.querySelector("#postOwnerActions");
        if (actions) actions.hidden = !canManageCurrentPost();
      }

      function getYoutubeEmbed(url) {
        const value = String(url || "").trim();
        const match = value.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{6,})/);
        return match ? `https://www.youtube.com/embed/${match[1]}` : "";
      }

      function renderEditMediaPreview() {
        const preview = document.querySelector("#postEditMediaPreview");
        if (!preview) return;
        preview.innerHTML = "";
        const media = currentPost?.media || {};
        const existingImages = Array.isArray(media.images) ? media.images.length : 0;
        const existingVideos = Array.isArray(media.videos) ? media.videos.length : media.videoFile ? 1 : 0;
        if (existingImages) {
          const item = document.createElement("span");
          item.textContent = `기존 이미지 ${existingImages}개`;
          preview.append(item);
        }
        if (existingVideos) {
          const item = document.createElement("span");
          item.textContent = `기존 동영상 ${existingVideos}개`;
          preview.append(item);
        }
        editImageFiles.forEach((file) => {
          const item = document.createElement("span");
          item.textContent = `추가 이미지 · ${file.name}`;
          preview.append(item);
        });
        editVideoFiles.forEach((file) => {
          const item = document.createElement("span");
          item.textContent = `추가 동영상 · ${file.name}`;
          preview.append(item);
        });
        const youtube = document.querySelector("#postEditYoutubeInput")?.value.trim();
        if (youtube || media.youtubeEmbed) {
          const item = document.createElement("span");
          item.textContent = youtube
            ? getYoutubeEmbed(youtube) ? "유튜브 · 새 링크 연결됨" : "유튜브 · 링크 확인 필요"
            : "기존 유튜브 링크 유지";
          preview.append(item);
        }
      }

      function openPostEditor() {
        if (!currentPost) return;
        if (currentPost.media?.pveGuide) {
          location.href = `/board/write?edit=${encodeURIComponent(currentPost.id)}`;
          return;
        }
        const form = document.querySelector("#postEditForm");
        form.hidden = false;
        form.elements.title.value = currentPost.title || "";
        form.elements.category.value = currentPost.category || "";
        form.elements.game.value = currentPost.game || "";
        form.elements.summary.value = currentPost.summary || "";
        form.elements.body.value = currentPost.body || "";
        form.elements.tags.value = Array.isArray(currentPost.tags) ? currentPost.tags.join(", ") : "";
        document.querySelector("#postEditYoutubeInput").value = currentPost.media?.youtube || "";
        document.querySelector("#postEditYoutubeField").hidden = !currentPost.media?.youtube;
        editImageFiles = [];
        editVideoFiles = [];
        renderEditMediaPreview();
        document.querySelector("#postEditError").hidden = true;
        form.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function closePostEditor() {
        document.querySelector("#postEditForm").hidden = true;
      }

      async function submitPostEdit(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const error = document.querySelector("#postEditError");
        const formData = new FormData();
        formData.set("title", form.elements.title.value);
        formData.set("category", form.elements.category.value);
        formData.set("game", form.elements.game.value);
        formData.set("summary", form.elements.summary.value);
        formData.set("body", form.elements.body.value);
        formData.set("tags", form.elements.tags.value);
        const youtube = document.querySelector("#postEditYoutubeInput").value.trim();
        formData.set("youtube", youtube);
        formData.set("youtubeEmbed", getYoutubeEmbed(youtube));
        editImageFiles.forEach((file) => formData.append("images", file));
        editVideoFiles.forEach((file) => formData.append("videos", file));
        const response = await fetch(`/api/posts/${encodeURIComponent(currentPost.id)}`, {
          method: "PATCH",
          body: formData,
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({ error: "게시글 수정 실패" }));
          error.textContent = data.error || "게시글 수정 실패";
          error.hidden = false;
          return;
        }

        const data = await response.json();
        currentPost = data.post || currentPost;
        hydratePost(currentPost);
        editImageFiles = [];
        editVideoFiles = [];
        closePostEditor();
      }

      async function deletePost() {
        if (!currentPost || !confirm("게시글을 삭제할까요?")) return;
        const response = await fetch(`/api/posts/${encodeURIComponent(currentPost.id)}`, { method: "DELETE" });
        if (response.ok) {
          location.href = "/";
        }
      }

      async function loadPostData() {
        try {
          const response = await fetch(`/api/posts/${encodeURIComponent(postId)}`);
          if (!response.ok) throw new Error("post failed");
          return response.json();
        } catch {
          const guides = loadGuides();
          const postIndex = guides.findIndex((item) => item.id === postId);
          return {
            post: guides[postIndex],
            posts: guides,
            prevPost: guides[postIndex - 1],
            nextPost: guides[postIndex + 1],
          };
        }
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderInlineMarkup(value) {
        return escapeHtml(value)
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/__(.+?)__/g, "<u>$1</u>")
          .replace(/\*(.+?)\*/g, "<em>$1</em>")
          .replace(/~~(.+?)~~/g, "<s>$1</s>")
          .replace(/~(.+?)~/g, "<sub>$1</sub>")
          .replace(/\^(.+?)\^/g, "<sup>$1</sup>")
          .replace(/`(.+?)`/g, "<code>$1</code>")
          .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
          .replace(/\{color:([#a-zA-Z0-9(),.%\s-]+)\}(.+?)\{\/color\}/g, '<span style="color:$1">$2</span>')
          .replace(/(^|[\s([{<])@([가-힣A-Za-z0-9_-]{1,30})/g, '$1<span class="mention-token">@$2</span>');
      }

      function renderRichText(source) {
        const lines = String(source || "").split(/\r?\n/);
        const html = [];
        let inList = false;
        let inOrdered = false;
        let inCode = false;
        let inTable = false;

        const closeLists = () => {
          if (inList) html.push("</ul>");
          if (inOrdered) html.push("</ol>");
          inList = false;
          inOrdered = false;
        };
        const closeTable = () => {
          if (inTable) html.push("</table>");
          inTable = false;
        };
        const closeFlow = () => {
          closeLists();
          closeTable();
        };

        lines.forEach((line) => {
          if (line.trim() === "```") {
            closeFlow();
            html.push(inCode ? "</code></pre>" : "<pre><code>");
            inCode = !inCode;
            return;
          }
          if (inCode) {
            html.push(`${escapeHtml(line)}\n`);
            return;
          }
          if (!line.trim()) {
            closeFlow();
            return;
          }
          if (/^---+$/.test(line.trim())) {
            closeFlow();
            html.push("<hr>");
            return;
          }
          if (/^- \[[ xX]\]\s+/.test(line)) {
            closeTable();
            if (!inList) {
              closeLists();
              html.push("<ul>");
              inList = true;
            }
            const checked = /^- \[[xX]\]/.test(line);
            const label = line.replace(/^- \[[ xX]\]\s+/, "");
            html.push(`<li class="check-preview"><input type="checkbox" disabled ${checked ? "checked" : ""}> ${renderInlineMarkup(label)}</li>`);
            return;
          }
          if (/^\|.+\|$/.test(line.trim())) {
            closeLists();
            if (/^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(line.trim())) return;
            if (!inTable) {
              html.push("<table>");
              inTable = true;
            }
            const cells = line.trim().slice(1, -1).split("|").map((cell) => `<td>${renderInlineMarkup(cell.trim())}</td>`).join("");
            html.push(`<tr>${cells}</tr>`);
            return;
          }
          closeTable();
          if (/^\d+\.\s+/.test(line)) {
            if (!inOrdered) {
              closeLists();
              html.push("<ol>");
              inOrdered = true;
            }
            html.push(`<li>${renderInlineMarkup(line.replace(/^\d+\.\s+/, ""))}</li>`);
            return;
          }
          if (/^[-*]\s+/.test(line)) {
            if (!inList) {
              closeLists();
              html.push("<ul>");
              inList = true;
            }
            html.push(`<li>${renderInlineMarkup(line.replace(/^[-*]\s+/, ""))}</li>`);
            return;
          }
          closeLists();
          if (line.startsWith("### ")) html.push(`<h3>${renderInlineMarkup(line.slice(4))}</h3>`);
          else if (line.startsWith("## ")) html.push(`<h2>${renderInlineMarkup(line.slice(3))}</h2>`);
          else if (line.startsWith("> ")) html.push(`<blockquote>${renderInlineMarkup(line.slice(2))}</blockquote>`);
          else if (line.startsWith(":::compare")) html.push('<section class="compare-preview">');
          else if (line.startsWith(":::end")) html.push("</section>");
          else html.push(`<p>${renderInlineMarkup(line)}</p>`);
        });
        closeFlow();
        if (inCode) html.push("</code></pre>");
        return html.join("");
      }

      function renderPostBody(guide) {
        const body = document.querySelector("#postBody");
        const source = guide.body || guide.content || guide.summary || "아직 상세 본문이 없습니다.";
        body.innerHTML = renderRichText(source);

        renderPostMedia(body, guide.media || {});
        renderPveGuide(body, guide.media?.pveGuide);
      }

      function renderPveGuide(body, guide) {
        if (!guide || typeof guide !== "object") return;
        const mode = guide.mode === "pvp" ? "pvp" : "pve";
        const hasPayload = [guide.type, guide.boss, guide.power, guide.formation, guide.allyTeam, guide.winPlan, guide.caution, guide.mainPet, guide.subPet, guide.round2Pet, guide.note].some(Boolean)
          || (Array.isArray(guide.heroes) && guide.heroes.length)
          || (Array.isArray(guide.specs) && guide.specs.length);
        if (!hasPayload) return;

        const shell = document.createElement("section");

          def: [[1, 60, 85], [2, 60, 65], [3, 60, 45], [4, 60, 25], [5, 40, 55]],

      function isReservedMediaAsset(image = {}) {
        const haystack = `${image.name || ""} ${image.src || ""}`.toLowerCase();
        const reservedTokens = [
          "bbitsena",
          "logo",
          "role",
          "/assets/common/",
          "관리자",
          "기본",
          "일반",
          "정예",
          "최고관리자",
        ];
        return reservedTokens.some((token) => haystack.includes(token.toLowerCase()));
      }

      function renderPostMedia(body, media) {
        const images = Array.isArray(media.images)
          ? media.images.filter((image) => !isReservedMediaAsset(image))
          : [];
        const hasImages = images.length;
        const hasYoutube = Boolean(media.youtubeEmbed);
        const videos = Array.isArray(media.videos) && media.videos.length
          ? media.videos
          : media.videoFile ? [media.videoFile] : [];
        const hasVideo = Boolean(videos.length);
        if (!hasImages && !hasYoutube && !hasVideo) return;

        const wrap = document.createElement("div");
        wrap.className = "post-media";

        if (hasYoutube) {
          const frameWrap = document.createElement("div");
          const frame = document.createElement("iframe");
          frameWrap.className = "youtube-embed";
          frame.src = media.youtubeEmbed;
          frame.title = "YouTube video player";
          frame.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
          frame.allowFullscreen = true;
          frameWrap.append(frame);
          wrap.append(frameWrap);
        }

        if (hasImages) {
          images.forEach((image) => {
            const figure = document.createElement("figure");

        if (hasVideo) {

            if (videoFile.src) {
              const video = document.createElement("video");

              video.controls = true;
              video.preload = "metadata";

      function bindSiblingPost(selector, label, sibling) {

      function getCommentTime(comment) {
        const raw = String(comment?.createdAt || "").trim();
        const normalized = /^\d{4}-\d{2}-\d{2} \d{2}:\d{2}/.test(raw) ? `${raw.replace(" ", "T")}Z` : raw;
        const time = new Date(normalized).getTime();
        return Number.isFinite(time) ? time : 0;
      }

      function sortCommentsForDisplay(comments) {
        const byParent = new Map();
        const byId = new Map(comments.map((comment) => [comment.id, comment]));
        comments.forEach((comment) => {
          const parentId = comment.parentId && byId.has(comment.parentId) ? comment.parentId : null;
          if (!byParent.has(parentId)) byParent.set(parentId, []);
          byParent.get(parentId).push(comment);
        });

        const sortByTime = (items, mode = "registered") => {
          const direction = mode === "latest" ? -1 : 1;
          return [...items].sort((left, right) => {
            const diff = getCommentTime(left) - getCommentTime(right);
            if (diff) return diff * direction;
            return (Number(left.id) || 0) - (Number(right.id) || 0);
          });
        };

        const sorted = [];
        const appendThread = (comment) => {
          sorted.push(comment);
          sortByTime(byParent.get(comment.id) || [], "registered").forEach(appendThread);
        };
        sortByTime(byParent.get(null) || [], commentSortMode).forEach(appendThread);
        return sorted;
      }

      function setupCommentSortControls() {
        const sectionTitle = document.querySelector(".comment-section .section-title");
        if (!sectionTitle || sectionTitle.querySelector(".comment-sort-control")) return;
        const control = document.createElement("div");
        control.className = "comment-sort-control";
        control.setAttribute("aria-label", "\uB313\uAE00 \uC815\uB82C");
        [
          ["registered", "\uB4F1\uB85D\uC21C"],
          ["latest", "\uCD5C\uC2E0\uC21C"],
        ].forEach(([value, label]) => {
          const button = document.createElement("button");
          button.type = "button";
          button.dataset.commentSort = value;
          button.textContent = label;
          button.addEventListener("click", () => {
            saveCommentSortMode(value);
            updateCommentSortControls();
            renderComments(currentComments);
          });
          control.append(button);
        });
        sectionTitle.append(control);
        updateCommentSortControls();
      }

      function renderComments(comments) {
        const list = document.querySelector("#commentList");
        list.innerHTML = "";

        if (!comments.length) {
          const empty = document.createElement("p");
          empty.className = "account-empty";
          empty.textContent = "아직 댓글이 없습니다.";
          list.append(empty);
          return;
        }

        const commentMap = new Map(comments.map((comment) => [comment.id, comment]));

        sortCommentsForDisplay(comments).forEach((comment) => {
          const item = document.createElement("article");
          const head = document.createElement("div");
          const author = document.createElement("strong");
          const date = document.createElement("time");
          const replyMeta = document.createElement("span");
          const content = document.createElement("p");
          const actions = document.createElement("div");
          const voteButton = document.createElement("button");
          const replyButton = document.createElement("button");
          const parentComment = comment.parentId ? commentMap.get(comment.parentId) : null;

          item.className = comment.parentId ? "comment-item comment-reply" : "comment-item";
          if (comment.parentId) {
            replyMeta.className = "comment-reply-meta";
            replyMeta.textContent = `ㄴ ${parentComment?.author || "댓글"}님에게 답글`;
            item.append(replyMeta);
          }
          appendNameWithRole(author, comment.author || "익명", comment.authorRole);
          date.textContent = formatKstDate(comment.createdAt);
          content.innerHTML = renderCommentContent(comment.content || "");
          voteButton.className = "comment-vote-button";
          voteButton.classList.toggle("active", Boolean(comment.voted));
          voteButton.type = "button";
          voteButton.textContent = `추천 ${formatNumber(comment.votes)}`;
          voteButton.addEventListener("click", () => toggleCommentVote(comment.id, voteButton));
          replyButton.className = "comment-reply-button";
          replyButton.type = "button";
          replyButton.textContent = "답글";
          replyButton.addEventListener("click", () => setReplyTarget(comment));
          head.append(author, date);
          actions.className = "comment-actions";
          actions.append(voteButton, replyButton);
          item.append(head, content, actions);
          list.append(item);
        });
      }

      function setReplyTarget(comment) {
        replyTargetId = comment.id;
        const input = document.querySelector("#commentInput");
        input.placeholder = `${comment.author || "댓글"}님에게 답글`;
        if (!input.value.trim()) insertCommentMention(`@${comment.author || ""}`);
        input.focus();
      }

      function renderCommentContent(value) {
        return escapeHtml(value).replace(/(^|[\s([{<])@([가-힣A-Za-z0-9_-]{1,30})/g, '$1<span class="mention-token">@$2</span>');
      }

      function insertCommentMention(token) {
        const input = document.querySelector("#commentInput");
        if (!input || !token) return;
        const mention = token === "@" ? "@닉네임" : token;
        const start = input.selectionStart ?? input.value.length;
        const end = input.selectionEnd ?? input.value.length;
        const prefix = start > 0 && !/\s$/.test(input.value.slice(0, start)) ? " " : "";
        const suffix = /\s/.test(input.value.slice(end, end + 1)) ? "" : " ";
        input.value = `${input.value.slice(0, start)}${prefix}${mention}${suffix}${input.value.slice(end)}`;
        const caret = start + prefix.length + mention.length;
        input.focus();
        input.setSelectionRange(caret, caret);
      }

      async function loadComments() {
        const response = await fetch(`/api/posts/${encodeURIComponent(postId)}/comments`);
        if (!response.ok) return;
        currentComments = await response.json();
        renderComments(currentComments);
      }

      async function togglePostVote() {
        if (!currentPost) return;
        const response = await fetch(`/api/posts/${encodeURIComponent(currentPost.id)}/vote`, { method: "POST" });
        if (!response.ok) return;
        const result = await response.json();
        postVoted = Boolean(result.voted);
        currentPost = result.post || currentPost;
        renderVoteState(currentPost);
      }

      function renderBookmarkState() {
        const button = document.querySelector("#postBookmarkButton");
        if (!button || !currentPost) return;
        button.textContent = currentPost.bookmarked ? "북마크됨" : "북마크";
        button.classList.toggle("active", Boolean(currentPost.bookmarked));
      }

      async function toggleBookmark() {
        if (!currentPost) return;
        const response = await fetch(`/api/posts/${encodeURIComponent(currentPost.id)}/bookmark`, { method: "POST" });
        if (!response.ok) return;
        const data = await response.json().catch(() => ({}));
        currentPost.bookmarked = Boolean(data.bookmarked);
        renderBookmarkState();
      }

      async function reportPost() {
        if (!currentPost || currentPost.reported) return;
        const reason = prompt("신고 사유를 입력해주세요.");
        if (!reason?.trim()) return;
        const response = await fetch(`/api/posts/${encodeURIComponent(currentPost.id)}/report`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ reason }),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          alert(data.error || "신고 처리에 실패했습니다.");
          return;
        }
        currentPost.reported = true;
        const button = document.querySelector("#postReportButton");
        if (button) {
          button.textContent = "신고됨";
          button.disabled = true;
        }
      }

      async function toggleCommentVote(commentId, button) {
        const response = await fetch(`/api/comments/${encodeURIComponent(commentId)}/vote`, { method: "POST" });
        if (!response.ok) return;
        const result = await response.json();
        const comment = result.comment || {};
        button.classList.toggle("active", Boolean(result.voted));
        button.textContent = `추천 ${formatNumber(comment.votes)}`;
      }

      async function submitComment(event) {
        event.preventDefault();
        const input = document.querySelector("#commentInput");
        const error = document.querySelector("#commentError");
        const content = input.value.trim();
        if (!content) return;

        const response = await fetch(`/api/posts/${encodeURIComponent(postId)}/comments`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content, parentId: replyTargetId }),
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({ error: "댓글 등록에 실패했습니다." }));
          error.textContent = data.error || "댓글 등록에 실패했습니다.";
          error.hidden = false;
          return;
        }

        const result = await response.json();
        currentPost = result.post || currentPost;
        input.value = "";
        replyTargetId = null;
        input.placeholder = "댓글을 입력하세요.";
        error.hidden = true;
        renderVoteState(currentPost);
        await loadComments();
      }

      function hydratePost(guide) {
        const isNotice = isNoticePost(guide);
        document.querySelector("#postCard")?.classList.toggle("notice-detail", isNotice);
        document.title = `${guide.title} - 삐삐 길드`;
        setText("#postCategory", normalizeBoard(guide.category) || "게시글");
        setText("#postTitle", guide.title || "제목 없음");
        setText("#postSummary", guide.summary || "요약이 없습니다.");
        setText("#postGame", guide.game || "미지정");
        appendNameWithRole(document.querySelector("#postAuthor"), guide.author || guide.displayName || "익명", guide.authorRole);
        setText("#postDate", formatKstDate(guide.createdAt) || "알 수 없음");
        renderVoteState(guide);
        setText("#postViews", formatNumber(guide.views));
        setText("#sideAuthor", `작성자 ${guide.author || guide.displayName || "익명"}`);
        setText("#sideCategory", normalizeBoard(guide.category) || "게시판");
        setText("#sideViews", `조회 ${formatNumber(guide.views)}`);
        const noticeHeroMeta = document.querySelector("#noticeHeroMeta");
        if (noticeHeroMeta) {
          noticeHeroMeta.hidden = !isNotice;
          noticeHeroMeta.textContent = isNotice ? `${formatKstDate(guide.createdAt) || "날짜 없음"} · VIEW ${formatNumber(guide.views)}` : "";
        }
        const listTitle = document.querySelector(".post-list-section .section-title h2");
        const listDesc = document.querySelector(".post-list-section .section-title p");
        if (listTitle) listTitle.textContent = isNotice ? "공지사항 목록" : "게시글 목록";
        if (listDesc) listDesc.textContent = isNotice ? "다른 공지사항을 확인해보세요." : "다른 게시글도 이어서 확인해보세요.";
        const backLink = document.querySelector(".post-actions a");
        if (backLink && isNotice) backLink.href = "/board/notice";
        const sideWriteLink = document.querySelector("#sideWriteLink");
        if (sideWriteLink) sideWriteLink.href = isNotice ? "/board/notice/write" : "/board/write";
        renderPostBody(guide);
        renderBookmarkState();
        const reportButton = document.querySelector("#postReportButton");
        if (reportButton) {
          reportButton.textContent = guide.reported ? "신고됨" : "신고";
          reportButton.disabled = Boolean(guide.reported);
        }

        const tagBox = document.querySelector("#postTags");
        tagBox.innerHTML = "";
        const tags = Array.isArray(guide.tags) ? guide.tags : [];
        if (!tags.length) {
          const empty = document.createElement("span");
          empty.textContent = "태그 없음";
          tagBox.append(empty);
        }
        tags.forEach((tag) => {
          const node = document.createElement("span");
          node.textContent = `#${tag}`;
          tagBox.append(node);
        });

        if (guide.attachment) {
          document.querySelector("#attachmentSection").hidden = false;
          setText("#postAttachment", guide.attachment);
        }
        syncPostOwnerActions();
      }

      Promise.all([loadCurrentUser(), loadPostData()]).then(([, { post: guide, posts: guides }]) => {
        if (!guide) {
          document.querySelector("#notFound").hidden = false;
          return;
        }

        currentPost = guide;
        postVoted = Boolean(guide.voted);
        hydratePost(guide);
        const isNotice = isNoticePost(guide);
        const related = getRelatedPostSet(guides || [], guide);

        bindSiblingPost("#prevPost", "이전 글", related.prevPost);
        bindSiblingPost("#nextPost", "다음 글", related.nextPost);
        renderCompactList(related.posts, guide.id);
        document.querySelector("#postCard").hidden = false;
        document.querySelector("#postVoteButton")?.addEventListener("click", togglePostVote);
        document.querySelector("#postBookmarkButton")?.addEventListener("click", toggleBookmark);
        document.querySelector("#postReportButton")?.addEventListener("click", reportPost);
        document.querySelector("#postEditButton")?.addEventListener("click", openPostEditor);
        document.querySelector("#postDeleteButton")?.addEventListener("click", deletePost);
        document.querySelector("#postEditForm")?.addEventListener("submit", submitPostEdit);
        document.querySelector("#postEditCancelButton")?.addEventListener("click", closePostEditor);
        document.querySelector("#postEditYoutubeButton")?.addEventListener("click", () => {
          const field = document.querySelector("#postEditYoutubeField");
          field.hidden = !field.hidden;
          if (!field.hidden) document.querySelector("#postEditYoutubeInput")?.focus();
          renderEditMediaPreview();
        });
        document.querySelector("#postEditYoutubeInput")?.addEventListener("input", renderEditMediaPreview);
        document.querySelector("#postEditImageInput")?.addEventListener("change", (event) => {
          const selected = [...event.target.files].slice(0, 6);
          editImageFiles = selected.filter((file) => file.size <= maxImageSize);
          renderEditMediaPreview();
        });
        document.querySelector("#postEditVideoInput")?.addEventListener("change", (event) => {
          const selected = [...event.target.files].slice(0, 3);
          editVideoFiles = selected.filter((file) => file.size <= maxVideoSize);
          renderEditMediaPreview();
        });
        if (!isNotice) {
          setupCommentSortControls();
          document.querySelectorAll("[data-comment-mention]").forEach((button) => {
            button.addEventListener("click", () => insertCommentMention(button.dataset.commentMention));
          });
          window.BbibbiMentionAutocomplete?.attach(document.querySelector("#commentInput"));
          document.querySelector("#commentForm")?.addEventListener("submit", submitComment);
          loadComments();
        }
      });
    </script>
    <script src="/notification-client.js"></script>
  </body>
</html>
