<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공지 작성 - bbitsena</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="notice-compose-page">
    <header class="notice-page-topbar">
      <a class="notice-page-brand" href="index.html">
        <img class="site-logo" src="assets/common/logo.webp" alt="bbitsena" />
        <strong>bbitsena</strong>
      </a>
      <nav>
        <a href="index.html">홈</a>
        <a class="active" href="notices.html">공지사항</a>
        <a href="guild-war.html">길드전 족보</a>
      </nav>
    </header>

    <main class="notice-compose-shell">
      <section class="notice-compose-hero">
        <span>BBITSENA NOTICE</span>
        <h1>공지 작성</h1>
        <p>운영진 공지를 깔끔하게 등록합니다. 댓글과 일반 게시판 요소는 공지 상세에서 자동으로 제외됩니다.</p>
      </section>

      <form class="notice-compose-form" id="noticeForm">
        <div class="notice-compose-grid">
          <label>
            제목
            <input name="title" maxlength="70" placeholder="공지 제목을 입력하세요" required />
          </label>
          <label>
            요약
            <input name="summary" maxlength="220" placeholder="목록과 상단에 보일 짧은 설명" required />
          </label>
        </div>
        <label>
          내용
          <textarea name="body" rows="16" maxlength="20000" placeholder="공지 내용을 입력하세요. 줄바꿈은 상세페이지에 그대로 반영됩니다." required></textarea>
        </label>
        <div class="notice-compose-grid">
          <label>
            이미지
            <input id="noticeImages" type="file" accept="image/*" multiple />
          </label>
          <label>
            유튜브
            <input name="youtube" type="url" placeholder="선택 사항" />
          </label>
        </div>
        <div class="media-preview" id="noticeMediaPreview" aria-live="polite"></div>
        <p class="auth-error" id="noticeError" hidden></p>
        <div class="notice-compose-actions">
          <a href="notices.html">목록으로</a>
          <button type="submit" id="noticeSubmitButton">공지 등록</button>
        </div>
      </form>
    </main>

    <script>
      const form = document.querySelector("#noticeForm");
      const imageInput = document.querySelector("#noticeImages");
      const preview = document.querySelector("#noticeMediaPreview");
      const errorBox = document.querySelector("#noticeError");
      const submitButton = document.querySelector("#noticeSubmitButton");
      const maxImageSize = 8 * 1024 * 1024;
      let imageFiles = [];

      function getYoutubeEmbed(url) {
        const value = String(url || "").trim();
        if (!value) return "";
        try {
          const parsed = new URL(value);
          let id = "";
          if (parsed.hostname.includes("youtu.be")) id = parsed.pathname.slice(1);
          if (parsed.hostname.includes("youtube.com")) id = parsed.searchParams.get("v") || parsed.pathname.split("/").pop();
          return id ? `https://www.youtube.com/embed/${encodeURIComponent(id)}` : "";
        } catch {
          return "";
        }
      }

      function renderPreview() {
        preview.innerHTML = "";
        imageFiles.forEach((file) => {
          const item = document.createElement("span");
          item.textContent = `이미지 · ${file.name}`;
          preview.append(item);
        });
      }

      imageInput.addEventListener("change", () => {
        const selected = [...imageInput.files].slice(0, 6);
        const oversized = selected.filter((file) => file.size > maxImageSize);
        imageFiles = selected.filter((file) => file.size <= maxImageSize);
        if (oversized.length) {
          errorBox.textContent = "이미지는 8MB 이하만 업로드할 수 있습니다.";
          errorBox.hidden = false;
          imageInput.value = "";
        } else {
          errorBox.hidden = true;
        }
        renderPreview();
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorBox.hidden = true;
        submitButton.disabled = true;
        submitButton.textContent = "등록 중";

        const formData = new FormData(form);
        formData.set("category", "공지사항");
        formData.set("game", "bbitsena");
        formData.set("tags", JSON.stringify(["공지"]));
        formData.set("attachment", "");
        formData.set("youtube", formData.get("youtube") || "");
        formData.set("youtubeEmbed", getYoutubeEmbed(formData.get("youtube")));
        imageFiles.forEach((file) => formData.append("images", file));

        try {
          const response = await fetch("/api/posts", {
            method: "POST",
            credentials: "same-origin",
            body: formData,
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(payload.error || "공지 등록 실패");
          location.href = `post.html?id=${encodeURIComponent(payload.id)}`;
        } catch (error) {
          errorBox.textContent = error.message || "공지 등록 실패";
          errorBox.hidden = false;
          submitButton.disabled = false;
          submitButton.textContent = "공지 등록";
        }
      });
    </script>
  </body>
</html>
