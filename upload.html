<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공략 업로드 - 삣삐이 온다</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="upload-page">
    <main class="upload-shell">
      <a class="brand upload-brand" href="/">
        <img class="site-logo" src="/assets/common/logo.webp" alt="bbitsena" />
        <span class="brand-kicker">삣삐 커뮤니티</span>
        <strong>공략 업로드</strong>
        <small>SEVENKNIGHT : REBITH</small>
      </a>

      <section class="composer-card" id="upload">
        <div class="section-title">
          <div>
            <h1>새 공략 작성</h1>
            <p>작성한 내용은 현재 브라우저에 저장되고 게시판에 바로 표시됩니다.</p>
          </div>
          <span id="draftState">작성 대기</span>
        </div>

        <form id="guideForm" class="guide-form" autocomplete="off">
          <label>
            제목
            <input id="titleInput" name="title" type="text" maxlength="70" placeholder="공략 제목" required />
          </label>
          <input id="gameInput" name="game" type="hidden" value="세븐나이츠 리버스" />
          <div class="form-grid">
            <label>
              게시판
              <select id="categoryInput" name="category" required>
                <option value="PVP 게시판">PVP 게시판</option>
                <option value="PVP 공략">PVP 공략</option>
                <option value="PVE 공략">PVE 공략</option>
                <option value="파괴신">파괴신</option>
                <option value="공성전">공성전</option>
                <option value="돌발레이드">돌발레이드</option>
                <option value="임시 채널1">임시 채널1</option>
              </select>
            </label>
          </div>
          <label>
            요약
            <textarea id="summaryInput" name="summary" maxlength="220" placeholder="핵심 내용을 짧게 적어주세요." required></textarea>
          </label>
          <section class="pve-guide-editor" id="pveGuideEditor" hidden>
            <div class="pve-editor-head">
              <div>
                <span id="strategyEditorKicker">PVE 공략 전용</span>
                <h2 id="strategyEditorTitle">PVE 공략</h2>
              </div>
              <small id="strategyEditorDesc">입력한 내용은 상세페이지에서 공략 카드로 표시됩니다.</small>
            </div>
            <div class="pve-editor-grid">
              <label>
                <span id="strategyTypeLabel">공략 유형</span>
                <select data-pve-field="type" id="strategyTypeInput">
                  <option value="일반 레이드">일반 레이드</option>
                  <option value="돌발 레이드">돌발 레이드</option>
                  <option value="파괴신">파괴신</option>
                  <option value="공성전">공성전</option>
                </select>
              </label>
              <label>
                <span id="strategyBossLabel">보스 / 콘텐츠</span>
                <input data-pve-field="boss" id="strategyBossInput" type="text" maxlength="40" list="strategyBossOptions" placeholder="레오니드, 파멸의 눈동자" />
                <datalist id="strategyBossOptions"></datalist>
              </label>
              <label>
                <span id="strategyPowerLabel">권장 전투력</span>
                <input data-pve-field="power" id="strategyPowerInput" type="text" maxlength="40" placeholder="20턴 SS 500만, 관우 6초 필수" />
              </label>
              <label>
              <span id="strategyFormationLabel">배치 / 진형</span>
              <input data-pve-field="formation" id="strategyFormationInput" type="text" maxlength="60" placeholder="앞열 탱커 / 뒷열 딜러 4" />
            </label>
            <label>
              진형 이미지
              <select data-pve-field="formationType">
                <option value="">진형 선택</option>
                <option value="att">공격진형</option>
                <option value="bal">밸런스진형</option>
                <option value="base">기본진형</option>
                <option value="def">보호진형</option>
              </select>
            </label>
          </div>
            <div class="pve-mini-section pvp-only" id="pvpExtraFields" hidden>
              <h3>PVP 전용 체크</h3>
              <div class="pve-editor-grid">
                <label>
                  우리 조합
                  <input data-pve-field="allyTeam" type="text" maxlength="80" placeholder="우리 덱 3~5명을 적어주세요" />
                </label>
                <label>
                  승리 조건
                  <input data-pve-field="winPlan" type="text" maxlength="80" placeholder="선턴, 생존, 반격, 면역 제거 등" />
                </label>
                <label class="wide-field">
                  주의점
                  <textarea data-pve-field="caution" rows="3" maxlength="400" placeholder="상대 핵심 스킬, 밴/대체 영웅, 위험한 상황을 적어주세요"></textarea>
                </label>
              </div>
            </div>
            <div class="pve-mini-section">
              <h3>펫 구성</h3>
              <div class="pve-editor-grid">
                <label>
                  메인펫
                  <input data-pve-field="mainPet" id="strategyMainPetInput" type="text" maxlength="30" list="strategyPetOptions" placeholder="메인펫 이름" />
                </label>
                <label>
                  대체펫
                  <input data-pve-field="subPet" id="strategySubPetInput" type="text" maxlength="30" list="strategyPetOptions" placeholder="대체펫 이름" />
                </label>
              </div>
              <datalist id="strategyPetOptions"></datalist>
              <datalist id="strategyHeroOptions"></datalist>
              <datalist id="strategyExclusiveOptions">
                <option value="전용장비"></option>
              </datalist>
            </div>
            <div class="pve-mini-section">
              <h3 id="strategyHeroTitle">핵심 영웅</h3>
              <div class="pve-hero-grid" id="pveHeroGrid"></div>
            </div>
            <div class="pve-mini-section">
              <h3 id="strategySpecTitle">스펙 체크</h3>
              <div class="pve-spec-grid" id="pveSpecGrid"></div>
            </div>
            <label class="pve-note-field">
              <span id="strategyNoteLabel">운영 메모</span>
              <textarea data-pve-field="note" id="strategyNoteInput" rows="5" maxlength="1000" placeholder="스킬 순서, 주의할 패턴, 대체 영웅 등을 적어주세요."></textarea>
            </label>
          </section>
          <section class="editor-box" id="richEditorBox" aria-label="본문 작성기">
            <div class="editor-modebar" aria-label="작성 모드">
              <button type="button" class="active" id="editorWriteButton">편집기</button>
              <button type="button" id="editorPreviewButton">미리보기</button>
              <button type="button" id="editorFullscreenButton">전체화면</button>
            </div>
            <div class="editor-toolbar" aria-label="본문 도구">
              <button type="button" data-editor-action="heading">Tt</button>
              <button type="button" data-editor-action="color">색</button>
              <button type="button" data-editor-action="bold">B</button>
              <button type="button" data-editor-action="italic">I</button>
              <button type="button" data-editor-action="strike">S</button>
              <button type="button" data-editor-action="sub">x₁</button>
              <button type="button" data-editor-action="sup">x¹</button>
              <button type="button" data-editor-action="underline">U</button>
              <button type="button" data-editor-action="ul">• 목록</button>
              <button type="button" data-editor-action="ol">1. 목록</button>
              <button type="button" data-editor-action="quote">인용</button>
              <button type="button" data-editor-action="code">코드</button>
              <button type="button" data-editor-action="inline-code">`코드`</button>
              <button type="button" data-editor-action="divider">구분선</button>
              <button type="button" data-editor-action="link">링크</button>
              <button type="button" data-editor-action="mention">멘션</button>
              <label class="tool-file">
                이미지
                <input id="imageInput" type="file" accept="image/jpeg,image/png,image/gif,image/webp,image/avif,image/bmp,.jpg,.jpeg,.jfif,.png,.gif,.webp,.avif,.bmp" multiple />
              </label>
              <label class="tool-file">
                동영상
                <input id="videoInput" type="file" accept="video/mp4,video/webm,video/ogg,video/quicktime,video/x-m4v,video/mpeg,video/x-msvideo,video/x-matroska,.mp4,.m4v,.webm,.ogv,.ogg,.mov,.mpeg,.mpg,.avi,.mkv" multiple />
              </label>
              <button type="button" id="youtubeButton">유튜브</button>
              <button type="button" data-editor-action="table">표</button>
              <button type="button" data-editor-action="compare">비교</button>
              <button type="button" data-editor-action="checklist">체크</button>
            </div>
            <textarea
              id="bodyInput"
              name="body"
              rows="14"
              placeholder="공략 본문을 작성해주세요. 이미지와 유튜브 영상은 아래 미리보기와 상세페이지에 함께 표시됩니다."
            ></textarea>
            <div class="body-preview" id="bodyPreview" hidden></div>
            <div class="youtube-field" id="youtubeField" hidden>
              <input id="youtubeInput" name="youtube" type="url" placeholder="유튜브 링크를 붙여넣어 주세요." />
            </div>
            <p class="editor-help">멘션은 @닉네임, @전체, @관리자, @정예, @권한 형태로 사용할 수 있습니다.</p>
            <div class="media-preview" id="mediaPreview" aria-live="polite"></div>
          </section>
          <div class="form-grid">
            <label>
              태그
              <input id="tagsInput" name="tags" type="text" maxlength="80" placeholder="초보, 루트, 보스" />
            </label>
            <label class="file-field">
              첨부
              <input id="fileInput" name="file" type="file" />
              <span id="fileName">첨부 선택</span>
            </label>
          </div>
          <div class="upload-actions">
            <a href="/">게시판으로</a>
            <button class="submit-button" type="submit">업로드</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/theme.js"></script>
    <script src="/mention-autocomplete.js"></script>

      function fillSelect(select, items, placeholder) {
        select.innerHTML = "";
        const empty = document.createElement("option");
        empty.value = "";
        empty.textContent = placeholder;
        select.append(empty);
        items.forEach((item) => {
          const option = document.createElement("option");
          if (Array.isArray(item)) {
            option.value = item[0];
            option.textContent = item[1];
          } else {
            option.value = item;
            option.textContent = item;
          }
          select.append(option);
        });
      }

      function fillDatalist(datalist, items) {
        if (!datalist || datalist.children.length) return;
        items.forEach((item) => {
          const option = document.createElement("option");
          option.value = item;
          datalist.append(option);
        });
      }

      function setText(id, value) {
        const target = document.querySelector(id);
        if (target) target.textContent = value;
      }

      function isPvpCategory() {
        return pvpCategories.has(categoryInput.value);
      }

      function getStrategyMode() {
        if (!strategyCategories.has(categoryInput.value)) return "";

      function uploadPost(formData, onProgress) {
        return new Promise((resolve, reject) => {
          const request = new XMLHttpRequest();
          request.open("POST", "/api/posts");
          request.upload.addEventListener("progress", (event) => {
            if (!event.lengthComputable) return;
            onProgress(Math.max(1, Math.min(99, Math.round((event.loaded / event.total) * 100))));
          });
          request.addEventListener("load", () => {
            let payload = {};
            try {
              payload = JSON.parse(request.responseText || "{}");
            } catch {
              payload = {};
            }
            if (request.status >= 200 && request.status < 300) {
              resolve(payload);
            } else {
              reject(new Error(payload.error || "업로드 실패"));
            }
          });
          request.addEventListener("error", () => reject(new Error("업로드 연결 실패")));
          request.addEventListener("abort", () => reject(new Error("업로드 취소됨")));
          request.send(formData);
        });
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderInlineMarkup(value) {
        return escapeHtml(value)
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/__(.+?)__/g, "<u>$1</u>")
          .replace(/\*(.+?)\*/g, "<em>$1</em>")
          .replace(/~~(.+?)~~/g, "<s>$1</s>")
          .replace(/~(.+?)~/g, "<sub>$1</sub>")
          .replace(/\^(.+?)\^/g, "<sup>$1</sup>")
          .replace(/`(.+?)`/g, "<code>$1</code>")
          .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
          .replace(/\{color:([#a-zA-Z0-9(),.%\s-]+)\}(.+?)\{\/color\}/g, '<span style="color:$1">$2</span>');
      }

      function renderBodyPreview() {
        const lines = bodyInput.value.split(/\r?\n/);
        const html = [];
        let inList = false;
        let inOrdered = false;
        let inCode = false;
        let inTable = false;

        const closeLists = () => {
          if (inList) html.push("</ul>");
          if (inOrdered) html.push("</ol>");
          inList = false;
          inOrdered = false;
        };
        const closeTable = () => {
          if (inTable) html.push("</table>");
          inTable = false;
        };

        lines.forEach((line) => {
          if (line.trim() === "```") {
            closeLists();
            closeTable();
            html.push(inCode ? "</code></pre>" : "<pre><code>");
            inCode = !inCode;
            return;
          }
          if (inCode) {
            html.push(`${escapeHtml(line)}\n`);
            return;
          }
          if (!line.trim()) {
            closeLists();
            closeTable();
            return;
          }
          if (/^---+$/.test(line.trim())) {
            closeLists();
            closeTable();
            html.push("<hr>");
            return;
          }
          if (/^- \[[ xX]\]\s+/.test(line)) {
            closeTable();
            if (!inList) {
              closeLists();
              html.push("<ul>");
              inList = true;
            }
            const checked = /^- \[[xX]\]/.test(line);
            const label = line.replace(/^- \[[ xX]\]\s+/, "");
            html.push(`<li class="check-preview"><input type="checkbox" disabled ${checked ? "checked" : ""}> ${renderInlineMarkup(label)}</li>`);
            return;
          }
          if (/^\|.+\|$/.test(line.trim())) {
            closeLists();
            if (/^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(line.trim())) return;
            if (!inTable) {
              html.push("<table>");
              inTable = true;
            }
            const cells = line.trim().slice(1, -1).split("|").map((cell) => `<td>${renderInlineMarkup(cell.trim())}</td>`).join("");
            html.push(`<tr>${cells}</tr>`);
            return;
          }
          closeTable();
          if (/^\d+\.\s+/.test(line)) {
            if (!inOrdered) {
              closeLists();
              html.push("<ol>");
              inOrdered = true;
            }
            html.push(`<li>${renderInlineMarkup(line.replace(/^\d+\.\s+/, ""))}</li>`);
            return;
          }
          if (/^[-*]\s+/.test(line)) {
            if (!inList) {
              closeLists();
              html.push("<ul>");
              inList = true;
            }
            html.push(`<li>${renderInlineMarkup(line.replace(/^[-*]\s+/, ""))}</li>`);
            return;
          }
          closeLists();
          if (line.startsWith("### ")) html.push(`<h3>${renderInlineMarkup(line.slice(4))}</h3>`);
          else if (line.startsWith("## ")) html.push(`<h2>${renderInlineMarkup(line.slice(3))}</h2>`);
          else if (line.startsWith("> ")) html.push(`<blockquote>${renderInlineMarkup(line.slice(2))}</blockquote>`);
          else if (line.startsWith(":::compare")) html.push('<section class="compare-preview">');
          else if (line.startsWith(":::end")) html.push("</section>");
          else html.push(`<p>${renderInlineMarkup(line)}</p>`);
        });
        closeLists();
        closeTable();
        if (inCode) html.push("</code></pre>");
        bodyPreview.innerHTML = html.join("");
      }

      function insertAtSelection(before, after = "", placeholder = "") {
        const start = bodyInput.selectionStart;
        const end = bodyInput.selectionEnd;
        const selected = bodyInput.value.slice(start, end) || placeholder;
        const insert = `${before}${selected}${after}`;
        bodyInput.value = `${bodyInput.value.slice(0, start)}${insert}${bodyInput.value.slice(end)}`;
        bodyInput.focus();
        bodyInput.setSelectionRange(start + before.length, start + before.length + selected.length);
        scheduleDraftSave();
        renderBodyPreview();
      }

      function insertBlock(text) {
        const start = bodyInput.selectionStart;
        const prefix = start > 0 && !bodyInput.value.slice(0, start).endsWith("\n") ? "\n" : "";
        const insert = `${prefix}${text}`;
        bodyInput.value = `${bodyInput.value.slice(0, start)}${insert}${bodyInput.value.slice(start)}`;
        bodyInput.focus();
        bodyInput.setSelectionRange(start + insert.length, start + insert.length);
        scheduleDraftSave();
        renderBodyPreview();
      }

      function handleEditorAction(action) {
        const selected = bodyInput.value.slice(bodyInput.selectionStart, bodyInput.selectionEnd);
        if (action === "heading") return insertBlock(`## ${selected || "소제목"}`);
        if (action === "color") return insertAtSelection("{color:#ffdd66}", "{/color}", "강조할 문장");
        if (action === "bold") return insertAtSelection("**", "**", "굵게");
        if (action === "italic") return insertAtSelection("*", "*", "기울임");
        if (action === "strike") return insertAtSelection("~~", "~~", "취소선");
        if (action === "underline") return insertAtSelection("__", "__", "밑줄");
        if (action === "sub") return insertAtSelection("~", "~", "아래첨자");
        if (action === "sup") return insertAtSelection("^", "^", "위첨자");
        if (action === "ul") return insertBlock("- 첫 번째 항목\n- 두 번째 항목");
        if (action === "ol") return insertBlock("1. 첫 번째 항목\n2. 두 번째 항목");
        if (action === "quote") return insertBlock(`> ${selected || "인용문"}`);
        if (action === "code") return insertBlock(`\`\`\`\n${selected || "코드 또는 표기할 내용"}\n\`\`\``);
        if (action === "inline-code") return insertAtSelection("`", "`", "짧은 코드");
        if (action === "divider") return insertBlock("---");
        if (action === "link") return insertAtSelection("[", "](https://)", selected || "링크");
        if (action === "mention") return insertAtSelection("@", "", selected || "닉네임");
        if (action === "table") return insertBlock("| 항목 | 값 |\n| --- | --- |\n| 이름 | 내용 |\n| 효과 | 내용 |");
        if (action === "compare") return insertBlock(":::compare\n| 기준 | A | B |\n| 장점 | 내용 | 내용 |\n| 단점 | 내용 | 내용 |\n:::end");
        if (action === "checklist") return insertBlock("- [ ] 확인할 내용\n- [x] 완료한 내용");
      }

        videoFiles = selected.filter((file) => file.size <= maxVideoSize);
        if (oversized.length) {
          draftState.textContent = "동영상은 파일당 500MB 이하만 업로드할 수 있어요.";
          videoInput.value = "";
        }
        renderMediaPreview();
      });

      youtubeInput.addEventListener("input", renderMediaPreview);
      categoryInput.addEventListener("change", () => {
        togglePveEditor();
        scheduleDraftSave();
      });
      strategyTypeInput?.addEventListener("change", () => {
        updateStrategyBossOptions();
        updateStrategyHeroSlots();
        scheduleDraftSave();
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (isUploading) return;
        isUploading = true;
        uploadProgress = 0;
        submitButton.disabled = true;
        submitButton.textContent = "업로드 중";
        draftState.textContent = "업로드 준비 중";
        renderMediaPreview();

        const formData = new FormData(form);
        formData.delete("file");
        formData.set("game", "세븐나이츠 리버스");
        formData.set("tags", JSON.stringify(normalizeTags(formData.get("tags") || "")));
        formData.set("attachment", fileInput.files[0]?.name || "");
        formData.set("youtube", youtubeInput.value.trim());
        formData.set("youtubeEmbed", getYoutubeEmbed(youtubeInput.value));
        const pveGuide = readPveGuide();
        if (pveGuide) formData.set("pveGuide", JSON.stringify(pveGuide));
        imageFiles.forEach((file) => formData.append("images", file));
        videoFiles.forEach((file) => formData.append("videos", file));

        let saved;
        try {
          saved = await uploadPost(formData, (progress) => {
            uploadProgress = progress;
            draftState.textContent = `업로드 중 ${progress}%`;
            renderMediaPreview();
          });
        } catch (error) {
          isUploading = false;
          submitButton.disabled = false;
          submitButton.textContent = "업로드";
          draftState.textContent = error.message || "업로드 실패";
          renderMediaPreview();
          return;
        }

        uploadProgress = 100;
        draftState.textContent = "업로드 완료";
        localStorage.setItem(storageKey, JSON.stringify([saved, ...loadGuides()]));
        clearDraft();
        form.reset();
        imageFiles = [];
        videoFiles = [];
        mediaPreview.innerHTML = "";
        youtubeField.hidden = true;
        fileName.textContent = "첨부 선택";
        draftState.textContent = "업로드 완료";
        location.href = `/board/post?id=${encodeURIComponent(saved.id)}`;
      });

      createPveRows();
      togglePveEditor();
      restoreDraft();
    </script>
    <script src="/notification-client.js"></script>
  </body>
</html>
