<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공략 업로드 - 삣삐이 온다</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="upload-page">
    <main class="upload-shell">
      <a class="brand upload-brand" href="index.html">
        <span class="brand-kicker">삣삐 커뮤니티</span>
        <strong>공략 업로드</strong>
        <small>SEVENKNIGHT : REBITH</small>
      </a>

      <section class="upload-type-grid" aria-label="업로드 유형">
        <a class="upload-type-card active" href="upload.html">
          <span>일반</span>
          <strong>게시글 작성</strong>
          <small>자유 공략, 질문, 정보글</small>
        </a>
        <a class="upload-type-card" href="guild-war-admin.html">
          <span>족보</span>
          <strong>길드전 족보</strong>
          <small>방어대, 공격 조합, 스킬 순서</small>
        </a>
      </section>

      <section class="composer-card" id="upload">
        <div class="section-title">
          <div>
            <h1>새 공략 작성</h1>
            <p>작성한 내용은 현재 브라우저에 저장되고 게시판에 바로 표시됩니다.</p>
          </div>
          <span id="draftState">작성 대기</span>
        </div>

        <form id="guideForm" class="guide-form" autocomplete="off">
          <label>
            제목
            <input id="titleInput" name="title" type="text" maxlength="70" placeholder="공략 제목" required />
          </label>
          <div class="form-grid">
            <label>
              게임
              <input id="gameInput" name="game" type="text" maxlength="40" placeholder="게임 이름" required />
            </label>
            <label>
              게시판
              <select id="categoryInput" name="category" required>
                <option value="PVE 공략">PVE 공략</option>
                <option value="길드전 족보">길드전 족보</option>
                <option value="질문">질문</option>
                <option value="게임">게임</option>
                <option value="기술">기술</option>
                <option value="잡담">잡담</option>
                <option value="유머">유머</option>
              </select>
            </label>
          </div>
          <label>
            요약
            <textarea id="summaryInput" name="summary" maxlength="220" placeholder="핵심 내용을 짧게 적어주세요." required></textarea>
          </label>
          <section class="editor-box" aria-label="본문 작성기">
            <div class="editor-toolbar" aria-label="본문 도구">
              <button type="button" data-insert="## 소제목">소제목</button>
              <button type="button" data-insert="- 체크할 내용">목록</button>
              <button type="button" data-insert="**강조할 내용**">강조</button>
              <label class="tool-file">
                이미지
                <input id="imageInput" type="file" accept="image/*" multiple />
              </label>
              <label class="tool-file">
                동영상
                <input id="videoInput" type="file" accept="video/*" />
              </label>
              <button type="button" id="youtubeButton">유튜브</button>
            </div>
            <textarea
              id="bodyInput"
              name="body"
              rows="14"
              placeholder="공략 본문을 작성해주세요. 이미지와 유튜브 영상은 아래 미리보기와 상세페이지에 함께 표시됩니다."
            ></textarea>
            <div class="youtube-field" id="youtubeField" hidden>
              <input id="youtubeInput" name="youtube" type="url" placeholder="유튜브 링크를 붙여넣어 주세요." />
            </div>
            <div class="media-preview" id="mediaPreview" aria-live="polite"></div>
          </section>
          <div class="form-grid">
            <label>
              태그
              <input id="tagsInput" name="tags" type="text" maxlength="80" placeholder="초보, 루트, 보스" />
            </label>
            <label class="file-field">
              첨부
              <input id="fileInput" name="file" type="file" />
              <span id="fileName">첨부 선택</span>
            </label>
          </div>
          <div class="upload-actions">
            <a href="index.html">게시판으로</a>
            <button class="submit-button" type="submit">업로드</button>
          </div>
        </form>
      </section>
    </main>

    <script src="theme.js"></script>
    <script>
      const storageKey = "bbibbi-board-items-v2";
      const form = document.querySelector("#guideForm");
      const fileInput = document.querySelector("#fileInput");
      const fileName = document.querySelector("#fileName");
      const draftState = document.querySelector("#draftState");
      const imageInput = document.querySelector("#imageInput");
      const videoInput = document.querySelector("#videoInput");
      const youtubeInput = document.querySelector("#youtubeInput");
      const youtubeButton = document.querySelector("#youtubeButton");
      const youtubeField = document.querySelector("#youtubeField");
      const mediaPreview = document.querySelector("#mediaPreview");
      const bodyInput = document.querySelector("#bodyInput");
      let imageFiles = [];
      let videoFile = null;
      const maxImageSize = 1.5 * 1024 * 1024;

      function makeId() {
        if (crypto.randomUUID) return crypto.randomUUID();
        return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function normalizeTags(value) {
        return value
          .split(",")
          .map((tag) => tag.trim())
          .filter(Boolean)
          .slice(0, 4);
      }

      function loadGuides() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || "[]");
        } catch {
          return [];
        }
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function getYoutubeEmbed(url) {
        const value = String(url || "").trim();
        const match = value.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{6,})/);
        return match ? `https://www.youtube.com/embed/${match[1]}` : "";
      }

      function renderMediaPreview() {
        mediaPreview.innerHTML = "";

        imageFiles.forEach((file) => {
          const item = document.createElement("span");
          item.textContent = `이미지 · ${file.name}`;
          mediaPreview.append(item);
        });

        if (videoFile) {
          const item = document.createElement("span");
          item.textContent = `동영상 · ${videoFile.name}`;
          mediaPreview.append(item);
        }

        if (youtubeInput.value.trim()) {
          const item = document.createElement("span");
          item.textContent = getYoutubeEmbed(youtubeInput.value) ? "유튜브 · 연결됨" : "유튜브 · 링크 확인 필요";
          mediaPreview.append(item);
        }
      }

      form.addEventListener("input", () => {
        draftState.textContent = "작성 중";
      });

      fileInput.addEventListener("change", () => {
        fileName.textContent = fileInput.files[0]?.name || "첨부 선택";
      });

      document.querySelectorAll("[data-insert]").forEach((button) => {
        button.addEventListener("click", () => {
          const insert = button.dataset.insert;
          const start = bodyInput.selectionStart;
          const end = bodyInput.selectionEnd;
          bodyInput.value = `${bodyInput.value.slice(0, start)}${insert}${bodyInput.value.slice(end)}`;
          bodyInput.focus();
          bodyInput.setSelectionRange(start + insert.length, start + insert.length);
          draftState.textContent = "작성 중";
        });
      });

      youtubeButton.addEventListener("click", () => {
        youtubeField.hidden = !youtubeField.hidden;
        if (!youtubeField.hidden) youtubeInput.focus();
      });

      imageInput.addEventListener("change", () => {
        const selected = [...imageInput.files].slice(0, 6);
        const oversized = selected.filter((file) => file.size > maxImageSize);
        imageFiles = selected.filter((file) => file.size <= maxImageSize);
        if (oversized.length) {
          draftState.textContent = "큰 이미지는 제외됨";
        }
        renderMediaPreview();
      });

      videoInput.addEventListener("change", () => {
        videoFile = videoInput.files[0] || null;
        renderMediaPreview();
      });

      youtubeInput.addEventListener("input", renderMediaPreview);

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(form);
        const images = await Promise.all(
          imageFiles.map(async (file) => ({
            name: file.name,
            type: file.type,
            src: await fileToDataUrl(file),
          })),
        );
        const guide = {
          id: makeId(),
          title: formData.get("title").trim(),
          comments: 0,
          game: formData.get("game").trim(),
          category: formData.get("category"),
          summary: formData.get("summary").trim(),
          body: formData.get("body").trim(),
          tags: normalizeTags(formData.get("tags") || ""),
          attachment: fileInput.files[0]?.name || "",
          media: {
            images,
            videoFile: videoFile ? { name: videoFile.name, type: videoFile.type, size: videoFile.size } : null,
            youtube: youtubeInput.value.trim(),
            youtubeEmbed: getYoutubeEmbed(youtubeInput.value),
          },
          votes: 0,
          views: 0,
          createdAt: "방금 전",
        };

        localStorage.setItem(storageKey, JSON.stringify([guide, ...loadGuides()]));
        form.reset();
        imageFiles = [];
        videoFile = null;
        mediaPreview.innerHTML = "";
        youtubeField.hidden = true;
        fileName.textContent = "첨부 선택";
        draftState.textContent = "업로드 완료";
      });
    </script>
  </body>
</html>
