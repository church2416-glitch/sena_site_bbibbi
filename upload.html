<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공략 업로드 - 삣삐이 온다</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="upload-page">
    <main class="upload-shell">
      <a class="brand upload-brand" href="index.html">
        <img class="site-logo" src="assets/common/logo.png" alt="bbitsena" />
        <span class="brand-kicker">삣삐 커뮤니티</span>
        <strong>공략 업로드</strong>
        <small>SEVENKNIGHT : REBITH</small>
      </a>

      <section class="upload-type-grid" aria-label="업로드 유형">
        <a class="upload-type-card active" href="upload.html">
          <span>일반</span>
          <strong>게시글 작성</strong>
          <small>자유 공략, 질문, 정보글</small>
        </a>
        <a class="upload-type-card" href="guild-war-admin.html">
          <span>족보</span>
          <strong>길드전 족보</strong>
          <small>방어대, 공격 조합, 스킬 순서</small>
        </a>
      </section>

      <section class="composer-card" id="upload">
        <div class="section-title">
          <div>
            <h1>새 공략 작성</h1>
            <p>작성한 내용은 현재 브라우저에 저장되고 게시판에 바로 표시됩니다.</p>
          </div>
          <span id="draftState">작성 대기</span>
        </div>

        <form id="guideForm" class="guide-form" autocomplete="off">
          <label>
            제목
            <input id="titleInput" name="title" type="text" maxlength="70" placeholder="공략 제목" required />
          </label>
          <div class="form-grid">
            <label>
              게임
              <input id="gameInput" name="game" type="text" maxlength="40" placeholder="게임 이름" required />
            </label>
            <label>
              게시판
              <select id="categoryInput" name="category" required>
                <option value="공지사항">공지사항</option>
                <option value="PVP 게시판">PVP 게시판</option>
                <option value="PVE 공략">PVE 공략</option>
                <option value="파괴신">파괴신</option>
                <option value="공성전">공성전</option>
                <option value="기술">기술</option>
                <option value="잡담">잡담</option>
                <option value="유머">유머</option>
                <option value="임시 채널1">임시 채널1</option>
                <option value="임시 채널2">임시 채널2</option>
              </select>
            </label>
          </div>
          <label>
            요약
            <textarea id="summaryInput" name="summary" maxlength="220" placeholder="핵심 내용을 짧게 적어주세요." required></textarea>
          </label>
          <section class="pve-guide-editor" id="pveGuideEditor" hidden>
            <div class="pve-editor-head">
              <div>
                <span>PVE 공략 전용</span>
                <h2>레이드 공략 데이터</h2>
              </div>
              <small>입력한 내용은 상세페이지에서 공략 카드로 표시됩니다.</small>
            </div>
            <div class="pve-editor-grid">
              <label>
                공략 유형
                <select data-pve-field="type">
                  <option value="일반 레이드">일반 레이드</option>
                  <option value="돌발 레이드">돌발 레이드</option>
                  <option value="파괴신">파괴신</option>
                  <option value="공성전">공성전</option>
                </select>
              </label>
              <label>
                보스 / 콘텐츠
                <input data-pve-field="boss" type="text" maxlength="40" placeholder="레오니드, 파멸의 눈동자" />
              </label>
              <label>
                권장 전투력
                <input data-pve-field="power" type="text" maxlength="40" placeholder="20턴 SS 500만, 관우 6초 필수" />
              </label>
              <label>
              배치 / 진형
              <input data-pve-field="formation" type="text" maxlength="60" placeholder="앞열 탱커 / 뒷열 딜러 4" />
            </label>
            <label>
              진형 이미지
              <select data-pve-field="formationType">
                <option value="">진형 선택</option>
                <option value="att">공격진형</option>
                <option value="bal">밸런스진형</option>
                <option value="base">기본진형</option>
                <option value="def">보호진형</option>
              </select>
            </label>
          </div>
            <div class="pve-mini-section">
              <h3>핵심 영웅</h3>
              <div class="pve-hero-grid" id="pveHeroGrid"></div>
            </div>
            <div class="pve-mini-section">
              <h3>스펙 체크</h3>
              <div class="pve-spec-grid" id="pveSpecGrid"></div>
            </div>
            <label class="pve-note-field">
              운영 메모
              <textarea data-pve-field="note" rows="5" maxlength="1000" placeholder="스킬 순서, 주의할 패턴, 대체 영웅 등을 적어주세요."></textarea>
            </label>
          </section>
          <section class="editor-box" aria-label="본문 작성기">
            <div class="editor-toolbar" aria-label="본문 도구">
              <button type="button" data-insert="## 소제목">소제목</button>
              <button type="button" data-insert="- 체크할 내용">목록</button>
              <button type="button" data-insert="**강조할 내용**">강조</button>
              <label class="tool-file">
                이미지
                <input id="imageInput" type="file" accept="image/*" multiple />
              </label>
              <label class="tool-file">
                동영상
                <input id="videoInput" type="file" accept="video/*" multiple />
              </label>
              <button type="button" id="youtubeButton">유튜브</button>
            </div>
            <textarea
              id="bodyInput"
              name="body"
              rows="14"
              placeholder="공략 본문을 작성해주세요. 이미지와 유튜브 영상은 아래 미리보기와 상세페이지에 함께 표시됩니다."
            ></textarea>
            <div class="youtube-field" id="youtubeField" hidden>
              <input id="youtubeInput" name="youtube" type="url" placeholder="유튜브 링크를 붙여넣어 주세요." />
            </div>
            <div class="media-preview" id="mediaPreview" aria-live="polite"></div>
          </section>
          <div class="form-grid">
            <label>
              태그
              <input id="tagsInput" name="tags" type="text" maxlength="80" placeholder="초보, 루트, 보스" />
            </label>
            <label class="file-field">
              첨부
              <input id="fileInput" name="file" type="file" />
              <span id="fileName">첨부 선택</span>
            </label>
          </div>
          <div class="upload-actions">
            <a href="index.html">게시판으로</a>
            <button class="submit-button" type="submit">업로드</button>
          </div>
        </form>
      </section>
    </main>

    <script src="theme.js"></script>
    <script>
      const storageKey = "bbibbi-board-items-v2";
      const draftKey = "bbibbi-upload-draft-v1";
      const form = document.querySelector("#guideForm");
      const submitButton = form.querySelector(".submit-button");
      const fileInput = document.querySelector("#fileInput");
      const fileName = document.querySelector("#fileName");
      const draftState = document.querySelector("#draftState");
      const imageInput = document.querySelector("#imageInput");
      const videoInput = document.querySelector("#videoInput");
      const youtubeInput = document.querySelector("#youtubeInput");
      const youtubeButton = document.querySelector("#youtubeButton");
      const youtubeField = document.querySelector("#youtubeField");
      const mediaPreview = document.querySelector("#mediaPreview");
      const bodyInput = document.querySelector("#bodyInput");
      const categoryInput = document.querySelector("#categoryInput");
      const pveGuideEditor = document.querySelector("#pveGuideEditor");
      const pveHeroGrid = document.querySelector("#pveHeroGrid");
      const pveSpecGrid = document.querySelector("#pveSpecGrid");
      let imageFiles = [];
      let videoFiles = [];
      let isUploading = false;
      let uploadProgress = 0;
      let draftTimer = null;
      const maxImageSize = 8 * 1024 * 1024;
      const maxVideoSize = 500 * 1024 * 1024;
      const strategyCategories = new Set(["PVE 공략", "파괴신", "공성전", "PVP 게시판", "PVP 공략"]);
      const characterCatalog = [
        "겔리두스", "나타", "델론즈", "라드그리드", "라이언", "란드그리드", "레긴레이프", "레이첼", "로지", "루디",
        "룩", "리나", "린", "멜키르", "미스트", "밀리아", "바네사", "발리스타", "브브", "성진우",
        "손오공", "스파이크", "실베스타", "아라곤", "아멜리아", "아일린", "아킬라", "앨리스", "에이스", "엘리시아",
        "여포", "연희", "오목", "제이브", "쥬리", "챈슬러", "초선", "카구라", "카론", "카르마",
        "카린", "카일", "칼헤론", "콜트", "크리스", "키리엘", "태오", "트루드", "파이", "팔라누스",
        "프레이야", "플라튼", "헬레니아",
      ];
      const formationOptions = [
        ["att", "공격진형"],
        ["bal", "밸런스진형"],
        ["base", "기본진형"],
        ["def", "보호진형"],
      ];
      const accessoryTypes = ["", "불사의반지", "부활의반지", "권능의반지"];
      const accessoryRefines = ["", "세공", "권불", "불권", "부불", "불부", "권기", "기권"];
      const accessoryGrades = ["", "6", "5", "4", "6/6", "6/5", "6/4"];

      function fillSelect(select, items, placeholder) {
        select.innerHTML = "";
        const empty = document.createElement("option");
        empty.value = "";
        empty.textContent = placeholder;
        select.append(empty);
        items.forEach((item) => {
          const option = document.createElement("option");
          if (Array.isArray(item)) {
            option.value = item[0];
            option.textContent = item[1];
          } else {
            option.value = item;
            option.textContent = item;
          }
          select.append(option);
        });
      }

      function createPveRows() {
        if (pveHeroGrid && !pveHeroGrid.children.length) {
          Array.from({ length: 5 }).forEach((_, index) => {
            const row = document.createElement("label");
            row.innerHTML = `
              영웅 ${index + 1}
              <select data-pve-hero-name="${index}"></select>
              <input data-pve-hero-role="${index}" type="text" maxlength="40" placeholder="역할 / 대체" />
              <select data-pve-hero-accessory="${index}"></select>
              <select data-pve-hero-refine="${index}"></select>
              <select data-pve-hero-grade="${index}"></select>
            `;
            fillSelect(row.querySelector(`[data-pve-hero-name="${index}"]`), characterCatalog, "영웅 선택");
            fillSelect(row.querySelector(`[data-pve-hero-accessory="${index}"]`), accessoryTypes, "반지");
            fillSelect(row.querySelector(`[data-pve-hero-refine="${index}"]`), accessoryRefines, "세공");
            fillSelect(row.querySelector(`[data-pve-hero-grade="${index}"]`), accessoryGrades, "성급");
            pveHeroGrid.append(row);
          });
        }
        if (pveSpecGrid && !pveSpecGrid.children.length) {
          ["공격력", "방어", "속공", "치명", "막기", "기타"].forEach((label, index) => {
            const row = document.createElement("label");
            row.innerHTML = `
              ${label}
              <input data-pve-spec-label="${index}" type="text" maxlength="30" value="${label}" />
              <input data-pve-spec-value="${index}" type="text" maxlength="40" placeholder="권장 수치" />
              <input data-pve-spec-memo="${index}" type="text" maxlength="80" placeholder="메모" />
            `;
            pveSpecGrid.append(row);
          });
        }
      }

      function isPveCategory() {
        return strategyCategories.has(categoryInput.value);
      }

      function togglePveEditor() {
        if (!pveGuideEditor) return;
        pveGuideEditor.hidden = !isPveCategory();
      }

      function readPveGuide() {
        if (!isPveCategory()) return null;
        const field = (name) => pveGuideEditor.querySelector(`[data-pve-field="${name}"]`)?.value.trim() || "";
        return {
          type: field("type"),
          boss: field("boss"),
          power: field("power"),
          formation: field("formation"),
          formationType: field("formationType"),
          note: field("note"),
          heroes: Array.from({ length: 5 }).map((_, index) => ({
            name: pveGuideEditor.querySelector(`[data-pve-hero-name="${index}"]`)?.value.trim() || "",
            role: pveGuideEditor.querySelector(`[data-pve-hero-role="${index}"]`)?.value.trim() || "",
            accessory: pveGuideEditor.querySelector(`[data-pve-hero-accessory="${index}"]`)?.value.trim() || "",
            refine: pveGuideEditor.querySelector(`[data-pve-hero-refine="${index}"]`)?.value.trim() || "",
            grade: pveGuideEditor.querySelector(`[data-pve-hero-grade="${index}"]`)?.value.trim() || "",
          })),
          specs: Array.from({ length: 6 }).map((_, index) => ({
            label: pveGuideEditor.querySelector(`[data-pve-spec-label="${index}"]`)?.value.trim() || "",
            value: pveGuideEditor.querySelector(`[data-pve-spec-value="${index}"]`)?.value.trim() || "",
            memo: pveGuideEditor.querySelector(`[data-pve-spec-memo="${index}"]`)?.value.trim() || "",
          })),
        };
      }

      function restorePveGuide(pveGuide) {
        if (!pveGuide || typeof pveGuide !== "object") return;
        Object.entries(pveGuide).forEach(([key, value]) => {
          const input = pveGuideEditor.querySelector(`[data-pve-field="${key}"]`);
          if (input && typeof value === "string") input.value = value;
        });
        (pveGuide.heroes || []).forEach((hero, index) => {
          const name = pveGuideEditor.querySelector(`[data-pve-hero-name="${index}"]`);
          const role = pveGuideEditor.querySelector(`[data-pve-hero-role="${index}"]`);
          const accessory = pveGuideEditor.querySelector(`[data-pve-hero-accessory="${index}"]`);
          const refine = pveGuideEditor.querySelector(`[data-pve-hero-refine="${index}"]`);
          const grade = pveGuideEditor.querySelector(`[data-pve-hero-grade="${index}"]`);
          if (name) name.value = hero.name || "";
          if (role) role.value = hero.role || "";
          if (accessory) accessory.value = hero.accessory || "";
          if (refine) refine.value = hero.refine || "";
          if (grade) grade.value = hero.grade || "";
        });
        (pveGuide.specs || []).forEach((spec, index) => {
          const label = pveGuideEditor.querySelector(`[data-pve-spec-label="${index}"]`);
          const value = pveGuideEditor.querySelector(`[data-pve-spec-value="${index}"]`);
          const memo = pveGuideEditor.querySelector(`[data-pve-spec-memo="${index}"]`);
          if (label) label.value = spec.label || "";
          if (value) value.value = spec.value || "";
          if (memo) memo.value = spec.memo || "";
        });
      }

      function normalizeTags(value) {
        return value
          .split(",")
          .map((tag) => tag.trim())
          .filter(Boolean)
          .slice(0, 4);
      }

      function loadGuides() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || "[]");
        } catch {
          return [];
        }
      }

      function readDraft() {
        const formData = new FormData(form);
        return {
          title: String(formData.get("title") || ""),
          game: String(formData.get("game") || ""),
          category: String(formData.get("category") || ""),
          summary: String(formData.get("summary") || ""),
          body: String(formData.get("body") || ""),
          tags: String(formData.get("tags") || ""),
          youtube: youtubeInput.value.trim(),
          youtubeVisible: !youtubeField.hidden,
          pveGuide: readPveGuide(),
          savedAt: new Date().toISOString(),
        };
      }

      function draftHasContent(draft) {
        return ["title", "game", "summary", "body", "tags", "youtube"].some((key) => String(draft[key] || "").trim());
      }

      function saveDraftNow() {
        if (isUploading) return;
        const draft = readDraft();
        if (!draftHasContent(draft)) {
          localStorage.removeItem(draftKey);
          draftState.textContent = "작성 대기";
          return;
        }
        localStorage.setItem(draftKey, JSON.stringify(draft));
        draftState.textContent = "임시저장됨";
      }

      function scheduleDraftSave() {
        if (isUploading) return;
        draftState.textContent = "작성 중";
        clearTimeout(draftTimer);
        draftTimer = setTimeout(saveDraftNow, 450);
      }

      function restoreDraft() {
        try {
          const draft = JSON.parse(localStorage.getItem(draftKey) || "null");
          if (!draft || !draftHasContent(draft)) return;
          form.elements.namedItem("title").value = draft.title || "";
          form.elements.namedItem("game").value = draft.game || "";
          form.elements.namedItem("category").value = draft.category || form.elements.namedItem("category").value;
          form.elements.namedItem("summary").value = draft.summary || "";
          form.elements.namedItem("body").value = draft.body || "";
          form.elements.namedItem("tags").value = draft.tags || "";
          youtubeInput.value = draft.youtube || "";
          youtubeField.hidden = !draft.youtubeVisible && !youtubeInput.value.trim();
          togglePveEditor();
          restorePveGuide(draft.pveGuide);
          draftState.textContent = "임시저장 불러옴";
          renderMediaPreview();
        } catch {
          localStorage.removeItem(draftKey);
        }
      }

      function clearDraft() {
        clearTimeout(draftTimer);
        localStorage.removeItem(draftKey);
      }

      function getYoutubeEmbed(url) {
        const value = String(url || "").trim();
        const match = value.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{6,})/);
        return match ? `https://www.youtube.com/embed/${match[1]}` : "";
      }

      function renderMediaPreview() {
        mediaPreview.innerHTML = "";

        imageFiles.forEach((file) => {
          const item = document.createElement("span");
          item.textContent = `이미지 · ${file.name}`;
          mediaPreview.append(item);
        });

        videoFiles.forEach((file) => {
          const item = document.createElement("span");
          item.textContent = `동영상 · ${file.name}`;
          mediaPreview.append(item);
        });

        if (youtubeInput.value.trim()) {
          const item = document.createElement("span");
          item.textContent = getYoutubeEmbed(youtubeInput.value) ? "유튜브 · 연결됨" : "유튜브 · 링크 확인 필요";
          mediaPreview.append(item);
        }

        if (isUploading) {
          const item = document.createElement("span");
          item.className = "upload-progress-chip";
          item.textContent = `업로드 중 ${uploadProgress}%`;
          mediaPreview.append(item);
        }
      }

      function uploadPost(formData, onProgress) {
        return new Promise((resolve, reject) => {
          const request = new XMLHttpRequest();
          request.open("POST", "/api/posts");
          request.upload.addEventListener("progress", (event) => {
            if (!event.lengthComputable) return;
            onProgress(Math.max(1, Math.min(99, Math.round((event.loaded / event.total) * 100))));
          });
          request.addEventListener("load", () => {
            let payload = {};
            try {
              payload = JSON.parse(request.responseText || "{}");
            } catch {
              payload = {};
            }
            if (request.status >= 200 && request.status < 300) {
              resolve(payload);
            } else {
              reject(new Error(payload.error || "업로드 실패"));
            }
          });
          request.addEventListener("error", () => reject(new Error("업로드 연결 실패")));
          request.addEventListener("abort", () => reject(new Error("업로드 취소됨")));
          request.send(formData);
        });
      }

      form.addEventListener("input", scheduleDraftSave);
      form.addEventListener("change", scheduleDraftSave);

      fileInput.addEventListener("change", () => {
        fileName.textContent = fileInput.files[0]?.name || "첨부 선택";
      });

      document.querySelectorAll("[data-insert]").forEach((button) => {
        button.addEventListener("click", () => {
          const insert = button.dataset.insert;
          const start = bodyInput.selectionStart;
          const end = bodyInput.selectionEnd;
          bodyInput.value = `${bodyInput.value.slice(0, start)}${insert}${bodyInput.value.slice(end)}`;
          bodyInput.focus();
          bodyInput.setSelectionRange(start + insert.length, start + insert.length);
          scheduleDraftSave();
        });
      });

      youtubeButton.addEventListener("click", () => {
        youtubeField.hidden = !youtubeField.hidden;
        if (!youtubeField.hidden) youtubeInput.focus();
        scheduleDraftSave();
      });

      imageInput.addEventListener("change", () => {
        const selected = [...imageInput.files].slice(0, 6);
        const oversized = selected.filter((file) => file.size > maxImageSize);
        imageFiles = selected.filter((file) => file.size <= maxImageSize);
        if (oversized.length) {
          draftState.textContent = "큰 이미지는 제외됨";
        }
        renderMediaPreview();
      });

      videoInput.addEventListener("change", () => {
        const selected = [...videoInput.files].slice(0, 3);
        const oversized = selected.filter((file) => file.size > maxVideoSize);
        videoFiles = selected.filter((file) => file.size <= maxVideoSize);
        if (oversized.length) {
          draftState.textContent = "동영상은 파일당 500MB 이하만 업로드할 수 있어요.";
          videoInput.value = "";
        }
        renderMediaPreview();
      });

      youtubeInput.addEventListener("input", renderMediaPreview);
      categoryInput.addEventListener("change", () => {
        togglePveEditor();
        scheduleDraftSave();
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (isUploading) return;
        isUploading = true;
        uploadProgress = 0;
        submitButton.disabled = true;
        submitButton.textContent = "업로드 중";
        draftState.textContent = "업로드 준비 중";
        renderMediaPreview();

        const formData = new FormData(form);
        formData.delete("file");
        formData.set("tags", JSON.stringify(normalizeTags(formData.get("tags") || "")));
        formData.set("attachment", fileInput.files[0]?.name || "");
        formData.set("youtube", youtubeInput.value.trim());
        formData.set("youtubeEmbed", getYoutubeEmbed(youtubeInput.value));
        const pveGuide = readPveGuide();
        if (pveGuide) formData.set("pveGuide", JSON.stringify(pveGuide));
        imageFiles.forEach((file) => formData.append("images", file));
        videoFiles.forEach((file) => formData.append("videos", file));

        let saved;
        try {
          saved = await uploadPost(formData, (progress) => {
            uploadProgress = progress;
            draftState.textContent = `업로드 중 ${progress}%`;
            renderMediaPreview();
          });
        } catch (error) {
          isUploading = false;
          submitButton.disabled = false;
          submitButton.textContent = "업로드";
          draftState.textContent = error.message || "업로드 실패";
          renderMediaPreview();
          return;
        }

        uploadProgress = 100;
        draftState.textContent = "업로드 완료";
        localStorage.setItem(storageKey, JSON.stringify([saved, ...loadGuides()]));
        clearDraft();
        form.reset();
        imageFiles = [];
        videoFiles = [];
        mediaPreview.innerHTML = "";
        youtubeField.hidden = true;
        fileName.textContent = "첨부 선택";
        draftState.textContent = "업로드 완료";
        location.href = `post.html?id=${encodeURIComponent(saved.id)}`;
      });

      createPveRows();
      togglePveEditor();
      restoreDraft();
    </script>
    <script src="notification-client.js"></script>
  </body>
</html>
