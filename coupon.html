<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쿠폰 - bbitsena</title>
    <link rel="stylesheet" href="styles.css?v=coupon-bulk-20260530" />
  </head>
  <body class="coupon-page">
    <main class="coupon-shell">
      <a class="brand upload-brand" href="index.html">
        <img class="site-logo" src="assets/common/logo.webp" alt="bbitsena" />
        <span class="brand-kicker">bbitsena Utility</span>
        <strong>쿠폰</strong>
        <small>SEVENKNIGHT : REBIRTH</small>
      </a>

      <section class="coupon-panel">
        <div class="coupon-head">
          <div>
            <span>COUPON TOOL</span>
            <h1>회원번호 쿠폰 일괄 사용</h1>
            <p>회원번호를 입력하면 저장된 쿠폰을 위에서부터 하나씩 자동으로 사용합니다.</p>
          </div>
          <a href="index.html">메인으로</a>
        </div>

        <form id="couponBulkForm" class="coupon-form">
          <label>
            회원번호
            <input id="couponUidInput" name="uid" type="text" maxlength="40" autocomplete="off" placeholder="회원번호 입력" required />
          </label>
          <button class="submit-button" id="couponBulkButton" type="submit">저장된 쿠폰 전부 사용</button>
        </form>

        <div class="coupon-code-list" id="couponCodeList"></div>
        <p class="coupon-status" id="couponStatus" role="status">쿠폰 목록을 불러오는 중입니다.</p>
      </section>

      <section class="coupon-panel" id="couponAdminPanel" hidden>
        <div class="coupon-head compact">
          <div>
            <span>ADMIN</span>
            <h2>쿠폰 코드 저장</h2>
          </div>
        </div>
        <form id="couponCodeForm" class="coupon-form stacked">
          <label>
            쿠폰 코드
            <textarea id="couponCodesInput" rows="5" placeholder="쿠폰 코드를 줄바꿈 또는 쉼표로 입력"></textarea>
          </label>
          <button class="ghost-button" id="couponCodeSaveButton" type="submit">쿠폰 저장</button>
        </form>
      </section>

      <section class="coupon-panel">
        <div class="coupon-head compact">
          <div>
            <span>HISTORY</span>
            <h2>최근 처리 내역</h2>
          </div>
          <button class="ghost-button" id="couponReloadButton" type="button">새로고침</button>
        </div>
        <div class="coupon-history" id="couponHistory"></div>
      </section>
    </main>

    <script src="theme.js"></script>
    <script src="coupon.js?v=coupon-bulk-20260530"></script>
  </body>
</html>
